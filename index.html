<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const DEFAULT_NAMES = ["Yunus", "Batuhan", "Necati"];
const ACCENT = ["#c0392b","#1a5276","#1e8449"];
const LIGHT  = ["#fdf2f2","#f0f5fb","#f0faf3"];
const BORDER = ["#f5c6c2","#b8d4ed","#a9dfbf"];
const MONTHS = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran",
                "Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

const now = new Date();
const defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;

function fmt(n) {
  return n.toLocaleString("tr-TR",{minimumFractionDigits:2,maximumFractionDigits:2})+" ₺";
}
function fmtPDF(n) {
  return n.toLocaleString("tr-TR",{minimumFractionDigits:2,maximumFractionDigits:2})+" TL";
}
function trPDF(s) {
  return String(s)
    .replace(/İ/g,"I").replace(/ı/g,"i")
    .replace(/Ğ/g,"G").replace(/ğ/g,"g")
    .replace(/Ü/g,"U").replace(/ü/g,"u")
    .replace(/Ş/g,"S").replace(/ş/g,"s")
    .replace(/Ö/g,"O").replace(/ö/g,"o")
    .replace(/Ç/g,"C").replace(/ç/g,"c")
    .replace(/₺/g,"TL");
}
function nowStr(){return new Date().toLocaleDateString("tr-TR")+" "+new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});}
function todayStr(){return new Date().toLocaleDateString("tr-TR");}
function monthLabel(ym) {
  const [y,m]=ym.split("-");
  return `${MONTHS[parseInt(m)-1]} ${y}`;
}
function fbSave(path,value) {
  if(!window.__fbReady) return;
  window.__fbSet(window.__fbRef(window.__fbDb,path),value);
}
function fbListen(path,cb) {
  if(!window.__fbReady) return ()=>{};
  return window.__fbOn(window.__fbRef(window.__fbDb,path),snap=>cb(snap.val()));
}

function BarChart({stats,names}) {
  const maxVal=Math.max(...stats.map(d=>Math.max(d.inc,d.exp)),1);
  return (
    <div style={{background:"#fff",borderRadius:14,padding:"18px 16px",
      boxShadow:"0 2px 8px rgba(0,0,0,0.04)",border:"1px solid #ede9e3",marginBottom:16}}>
      <div style={{fontSize:11,color:"#aaa",letterSpacing:2,fontWeight:600,marginBottom:16}}>
        GELİR / GİDER KARŞILAŞTIRMASI
      </div>
      <div style={{display:"flex",gap:6,alignItems:"flex-end",height:100}}>
        {stats.map((d,i)=>{
          const incH=Math.round((d.inc/maxVal)*90);
          const expH=Math.round((d.exp/maxVal)*90);
          return (
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <div style={{display:"flex",gap:3,alignItems:"flex-end",height:90}}>
                <div style={{width:14,background:"#1e8449",borderRadius:"3px 3px 0 0",height:incH||2}}/>
                <div style={{width:14,background:"#c0392b",borderRadius:"3px 3px 0 0",height:expH||2}}/>
              </div>
              <div style={{fontSize:10,color:"#888",textAlign:"center",fontWeight:500}}>
                {names[i].slice(0,4)}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:16,marginTop:12,justifyContent:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:10,height:10,borderRadius:2,background:"#1e8449"}}/>
          <span style={{fontSize:11,color:"#888"}}>Gelir</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:10,height:10,borderRadius:2,background:"#c0392b"}}/>
          <span style={{fontSize:11,color:"#888"}}>Gider</span>
        </div>
      </div>
    </div>
  );
}

function TrendChart({months,summaries}) {
  if(months.length<2) return null;
  const vals=summaries.map(s=>s.netShare);
  const maxV=Math.max(...vals,1),minV=Math.min(...vals,0);
  const range=maxV-minV||1;
  const W=300,H=80;
  const pts=vals.map((v,i)=>{
    const x=(i/(vals.length-1))*(W-20)+10;
    const y=H-((v-minV)/range)*(H-16)-8;
    return `${x},${y}`;
  });
  return (
    <div style={{background:"#fff",borderRadius:14,padding:"18px 16px",
      boxShadow:"0 2px 8px rgba(0,0,0,0.04)",border:"1px solid #ede9e3",marginBottom:16}}>
      <div style={{fontSize:11,color:"#aaa",letterSpacing:2,fontWeight:600,marginBottom:12}}>
        AYLIK NET TREND
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H}}>
        <defs>
          <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#1a5276" stopOpacity="0.15"/>
            <stop offset="100%" stopColor="#1a5276" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <polygon points={`10,${H} ${pts.join(" ")} ${W-10},${H}`} fill="url(#tg)"/>
        <polyline points={pts.join(" ")} fill="none" stroke="#1a5276" strokeWidth="2" strokeLinejoin="round"/>
        {pts.map((pt,i)=>{const [x,y]=pt.split(","); return <circle key={i} cx={x} cy={y} r="3" fill="#1a5276"/>;})}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        {months.map((m,i)=>(
          <div key={i} style={{fontSize:9,color:"#bbb",textAlign:"center"}}>
            {MONTHS[parseInt(m.split("-")[1])-1].slice(0,3)}
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [donemler,     setDonemler]     = useState(null);
  const [names,        setNames]        = useState(DEFAULT_NAMES);
  const [screen,       setScreen]       = useState("home");
  const [subTab,       setSubTab]       = useState("kayitlar");
  const [form,         setForm]         = useState({type:"gelir",desc:"",amount:""});
  const [editingNames, setEditingNames] = useState(false);
  const [tempNames,    setTempNames]    = useState(DEFAULT_NAMES);
  const [fbReady,      setFbReady]      = useState(!!window.__fbReady);
  const [syncing,      setSyncing]      = useState(false);
  const [resetModal,   setResetModal]   = useState(false);
  const [resetConfirm, setResetConfirm] = useState("");
  const [toast,        setToast]        = useState(null);
  const [showArchive,  setShowArchive]  = useState(false);
  const [showNewDonem,     setShowNewDonem]     = useState(false);
  const [newDonemName,     setNewDonemName]     = useState("");
  const [showCloseConfirm, setShowCloseConfirm] = useState(false);
  const [editingEntry,  setEditingEntry]  = useState(null); // {pIdx, entry}
  const [editForm,      setEditForm]      = useState({desc:"",amount:""});

  const [eskiVeri,     setEskiVeri]     = useState(null);
  const [showMigrate,  setShowMigrate]  = useState(false);

  const aktifDonem = donemler ? (donemler.find(d=>!d.closed) || donemler[donemler.length-1] || null) : null;

  function eskiVeriAktar(birlesik){
    if(!eskiVeri) return;
    const MONTHS_=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
    const aylar=Object.keys(eskiVeri).sort();
    if(birlesik){
      // Tüm ayları tek dönemde birleştir
      const mergedData={};
      aylar.forEach(ay=>{
        [0,1,2].forEach(i=>{
          const entries=eskiVeri[ay]?.[i]||[];
          if(!mergedData[i])mergedData[i]=[];
          mergedData[i]=[...mergedData[i],...entries];
        });
      });
      const donem={id:"donem_"+Date.now(),name:"Aktarılan Kayıtlar",startDate:aylar[0],endDate:null,closed:false,createdAt:Date.now(),data:mergedData};
      fbSave("buro/donemler/"+donem.id,donem);
      setDonemler([donem]);
    } else {
      // Her ay ayrı dönem
      const yeniDonemler=aylar.map((ay,idx)=>{
        const [y,m]=ay.split("-");
        const label=MONTHS_[parseInt(m)-1]+" "+y;
        return{id:"donem_"+Date.now()+"_"+idx,name:label,startDate:ay+"-01",endDate:ay+"-28",closed:true,createdAt:Date.now()+idx,data:eskiVeri[ay]||{}};
      });
      if(yeniDonemler.length>0){yeniDonemler[yeniDonemler.length-1].closed=false;yeniDonemler[yeniDonemler.length-1].endDate=null;}
      yeniDonemler.forEach(d=>fbSave("buro/donemler/"+d.id,d));
      setDonemler(yeniDonemler);
    }
    setShowMigrate(false);setEskiVeri(null);
    showToast("✅ Eski veriler aktarıldı!","#1a5276");
  }

  useEffect(()=>{
    function start(){
      setFbReady(true);
      const u1=fbListen("buro/donemler",v=>{
        if(v){
          const arr=Object.entries(v).map(([id,val])=>({id,...val}));
          arr.sort((a,b)=>a.createdAt-b.createdAt);
          setDonemler(arr);
        } else {
          // Dönem yok - eski buro/data var mı kontrol et
          window.__fbOn(window.__fbRef(window.__fbDb,"buro/data"), snap=>{
            const oldData=snap.val();
            if(oldData && Object.keys(oldData).length>0){
              setEskiVeri(oldData);
              setShowMigrate(true);
              setDonemler([]);
            } else {
              const ilk={id:"donem_"+Date.now(),name:"İlk Dönem",startDate:todayStr(),endDate:null,closed:false,createdAt:Date.now(),data:{}};
              fbSave("buro/donemler/"+ilk.id,ilk);setDonemler([ilk]);
            }
          });
        }
      });
      const u2=fbListen("buro/names",v=>{if(v){setNames(v);setTempNames(v);}});
      return ()=>{u1&&u1();u2&&u2();};
    }
    if(window.__fbReady) return start();
    const h=()=>start();
    window.addEventListener("fb-ready",h);
    return ()=>window.removeEventListener("fb-ready",h);
  },[]);

  function showToast(msg,color="#1e8449"){
    setToast({msg,color});
    setTimeout(()=>setToast(null),2800);
  }
  function saveDonem(d){setSyncing(true);fbSave("buro/donemler/"+d.id,d);setTimeout(()=>setSyncing(false),800);}
  function getEntries(pIdx){return aktifDonem?.data?.[pIdx]||[];}
  function getEntriesOf(d,pIdx){return d?.data?.[pIdx]||[];}

  function calcSummary(d){
    let ti=0,te=0;
    const stats=[0,1,2].map(i=>{
      const inc=getEntriesOf(d,i).filter(e=>e.type==="gelir").reduce((s,e)=>s+e.amount,0);
      const exp=getEntriesOf(d,i).filter(e=>e.type==="gider").reduce((s,e)=>s+e.amount,0);
      ti+=inc;te+=exp;return{inc,exp};
    });
    const net=ti-te,pp=net/3;
    return{totalIncome:ti,totalExpense:te,netShare:net,perPerson:pp,stats,
      results:[0,1,2].map(i=>({...stats[i],toReceive:pp+stats[i].exp,balance:pp+stats[i].exp-stats[i].inc,perPerson:pp}))};
  }
  const emptySummary={totalIncome:0,totalExpense:0,netShare:0,perPerson:0,stats:[{inc:0,exp:0},{inc:0,exp:0},{inc:0,exp:0}],results:[0,1,2].map(()=>({inc:0,exp:0,toReceive:0,balance:0,perPerson:0}))};
  const summary=aktifDonem?calcSummary(aktifDonem):emptySummary;
  const pIdx=screen.startsWith("ortak-")?parseInt(screen.split("-")[1]):null;

  function addEntry(pIdx){
    if(!aktifDonem||aktifDonem.closed)return;
    const amount=parseFloat(form.amount);
    if(!form.desc.trim()||isNaN(amount)||amount<=0)return;
    const entry={id:Date.now(),type:form.type,desc:form.desc.trim(),amount,date:nowStr()};
    const nd=JSON.parse(JSON.stringify(aktifDonem));
    if(!nd.data)nd.data={};if(!nd.data[pIdx])nd.data[pIdx]=[];nd.data[pIdx].push(entry);
    saveDonem(nd);setDonemler(donemler.map(d=>d.id===nd.id?nd:d));
    setForm({type:form.type,desc:"",amount:""});
    showToast(form.type==="gelir"?"✓ Gelir eklendi":"✓ Gider eklendi",form.type==="gelir"?"#1e8449":"#c0392b");
  }
  function delEntry(pIdx,id){
    if(!aktifDonem||aktifDonem.closed)return;
    const nd=JSON.parse(JSON.stringify(aktifDonem));
    if(nd.data?.[pIdx])nd.data[pIdx]=nd.data[pIdx].filter(e=>e.id!==id);
    saveDonem(nd);setDonemler(donemler.map(d=>d.id===nd.id?nd:d));
  }
  function editEntry(pIdx, entry){
    setEditingEntry({pIdx, entry});
    setEditForm({desc:entry.desc, amount:String(entry.amount)});
  }
  function saveEditEntry(){
    if(!editingEntry||!aktifDonem||aktifDonem.closed)return;
    const amount=parseFloat(editForm.amount);
    if(!editForm.desc.trim()||isNaN(amount)||amount<=0)return;
    const nd=JSON.parse(JSON.stringify(aktifDonem));
    const {pIdx,entry}=editingEntry;
    if(nd.data?.[pIdx]){
      nd.data[pIdx]=nd.data[pIdx].map(e=>e.id===entry.id?{...e,desc:editForm.desc.trim(),amount}:e);
    }
    saveDonem(nd);setDonemler(donemler.map(d=>d.id===nd.id?nd:d));
    setEditingEntry(null);showToast("✓ Kayıt güncellendi");
  }

  function calcDenklesme(results,names){
    // Borçlular (balance < 0) alacaklılara (balance > 0) öder
    const odemeler=[];
    const borclu=[...results.map((r,i)=>({i,b:r.balance})).filter(x=>x.b<-0.01)].sort((a,b)=>a.b-b.b);
    const alacakli=[...results.map((r,i)=>({i,b:r.balance})).filter(x=>x.b>0.01)].sort((a,b)=>b.b-a.b);
    const bc=borclu.map(x=>({...x,rem:-x.b}));
    const ac=alacakli.map(x=>({...x,rem:x.b}));
    let bi=0,ai=0;
    while(bi<bc.length&&ai<ac.length){
      const miktar=Math.min(bc[bi].rem,ac[ai].rem);
      if(miktar>0.01) odemeler.push({from:bc[bi].i,to:ac[ai].i,amount:miktar});
      bc[bi].rem-=miktar; ac[ai].rem-=miktar;
      if(bc[bi].rem<0.01)bi++;
      if(ac[ai].rem<0.01)ai++;
    }
    return odemeler;
  }

  // Tüm dönemlerdeki tüm açıklamaları topla (öneri için)
  function getOneriler(){
    const set=new Set();
    if(!donemler)return[];
    donemler.forEach(d=>{
      [0,1,2].forEach(i=>{
        (d.data?.[i]||[]).forEach(e=>{if(e.desc)set.add(e.desc);});
      });
    });
    return [...set];
  }

  function doReset(){
    if(resetConfirm!=="SIFIRLA")return;
    const nd={...aktifDonem,data:{}};saveDonem(nd);setDonemler(donemler.map(d=>d.id===nd.id?nd:d));
    setResetModal(false);setResetConfirm("");showToast("🗑 Dönem verileri silindi","#c0392b");
  }
  function yeniDonemAc(){
    if(!newDonemName.trim())return;
    const yeni={id:"donem_"+Date.now(),name:newDonemName.trim(),startDate:todayStr(),endDate:null,closed:false,createdAt:Date.now(),data:{}};
    fbSave("buro/donemler/"+yeni.id,yeni);setDonemler([...donemler,yeni]);
    setShowNewDonem(false);setNewDonemName("");showToast("✓ Yeni dönem: "+yeni.name);
  }
  function donemKapat(){
    if(!aktifDonem)return;
    const s=calcSummary(aktifDonem);
    const dates=aktifDonem.startDate+" - "+todayStr();
    buildPDF(aktifDonem.name,dates,names,s,false,aktifDonem.data).save("Madalyon_"+aktifDonem.name.replace(/\s+/g,"_")+".pdf");
    const nd={...aktifDonem,closed:true,endDate:todayStr()};
    saveDonem(nd);setDonemler(donemler.map(d=>d.id===nd.id?nd:d));
    setShowCloseConfirm(false);showToast("✅ Dönem kapatıldı, PDF indirildi","#1a5276");setScreen("home");
  }
  function exportPDFAktif(){
    if(!aktifDonem)return;
    const s=calcSummary(aktifDonem);
    const dates=aktifDonem.startDate+" - "+(aktifDonem.endDate||"Devam ediyor");
    buildPDF(aktifDonem.name,dates,names,s,aktifDonem.closed,aktifDonem.data).save("Madalyon_"+aktifDonem.name.replace(/\s+/g,"_")+".pdf");
    showToast("📄 PDF indirildi");
  }
  function exportPDFDonem(d){
    const s=calcSummary(d);
    const dates=d.startDate+" - "+(d.endDate||"Devam ediyor");
    buildPDF(d.name,dates,names,s,d.closed,d.data).save("Madalyon_"+d.name.replace(/\s+/g,"_")+".pdf");
    showToast("📄 PDF indirildi");
  }

  function buildPDF(title, dates, names, s, isClosed, donemData){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const ML=14, RR=196, CW=182;
  const LINE = 0.2;

  function hline(y,lw){doc.setLineWidth(lw||LINE);doc.setDrawColor(180,180,180);doc.line(ML,y,RR,y);}
  function bold(s){doc.setFont("helvetica","bold");return trPDF(s);}
  function normal(s){doc.setFont("helvetica","normal");return trPDF(s);}
  function tc(r,g,b){doc.setTextColor(r,g,b);}
  function fc(r,g,b){doc.setFillColor(r,g,b);}

  // ══════════════════════════════
  // SAYFA 1 - ÖZET
  // ══════════════════════════════
  let y = 18;

  // Başlık
  doc.setFont("helvetica","bold"); doc.setFontSize(16); tc(26,26,26);
  doc.text("MADALYON HUKUK BUROSU", 105, y, {align:"center"});
  y += 7;
  doc.setFont("helvetica","normal"); doc.setFontSize(9); tc(120,120,120);
  doc.text(trPDF(title) + "   |   " + trPDF(dates), 105, y, {align:"center"});
  if(isClosed){
    y+=5;
    doc.setFont("helvetica","bold"); doc.setFontSize(8); tc(150,150,150);
    doc.text("[KAPALI DONEM]", 105, y, {align:"center"});
  }
  y += 8;
  hline(y, 0.5); y += 8;

  // ── GENEL ÖZET TABLOSU ──
  doc.setFont("helvetica","bold"); doc.setFontSize(9); tc(80,80,80);
  doc.text("GENEL OZET", ML, y); y += 5;

  const tRows = [
    ["Toplam Gelir", fmt(s.totalIncome), [30,132,73]],
    ["Toplam Gider", fmt(s.totalExpense), [192,57,43]],
    ["Net Dagitilacak", fmt(s.netShare), [26,82,118]],
    ["Kisi Basi Pay", fmt(s.perPerson), [80,80,80]],
  ];
  tRows.forEach(([lbl,val,rgb],ri)=>{
    const rowY = y + ri*8;
    if(ri%2===0){fc(248,248,248);doc.rect(ML,rowY-4,CW,8,"F");}
    doc.setFont("helvetica","normal"); doc.setFontSize(9); tc(60,60,60);
    doc.text(trPDF(lbl), ML+3, rowY+0.5);
    doc.setFont("helvetica","bold"); doc.setFontSize(9); tc(...rgb);
    doc.text(trPDF(val), RR-3, rowY+0.5, {align:"right"});
  });
  hline(y-4); hline(y+tRows.length*8-4);
  y += tRows.length*8 + 6;

  // ── ORTAK BAZLI TABLO ──
  doc.setFont("helvetica","bold"); doc.setFontSize(9); tc(80,80,80);
  doc.text("ORTAK BAZLI HESAP", ML, y); y+=5;

  // Tablo başlık
  fc(40,40,40); doc.rect(ML,y-4,CW,8,"F");
  doc.setFont("helvetica","bold"); doc.setFontSize(8); tc(255,255,255);
  const cols = [ML+3, ML+48, ML+88, ML+120, ML+152];
  ["ORTAK","TOPLANAN GELIR","YAPILAN GIDER","TOPLAM ALACAK","BAKIYE"].forEach((h,i)=>{
    doc.text(trPDF(h), cols[i], y+0.5);
  });
  y+=8;

  [0,1,2].forEach((i,ri)=>{
    const r=s.results[i];
    if(ri%2===0){fc(248,248,248);doc.rect(ML,y-4,CW,8,"F");}
    doc.setFont("helvetica","normal"); doc.setFontSize(8.5); tc(30,30,30);
    doc.text(trPDF(names[i]), cols[0], y+0.5);
    tc(30,132,73); doc.text(trPDF(fmt(r.inc)), cols[1], y+0.5);
    tc(192,57,43); doc.text(trPDF(fmt(r.exp)), cols[2], y+0.5);
    tc(26,82,118); doc.text(trPDF(fmt(r.toReceive)), cols[3], y+0.5);
    const balColor = r.balance>0.01?[30,132,73]:r.balance<-0.01?[192,57,43]:[120,120,120];
    tc(...balColor);
    const balTxt = r.balance>0.01?"+"+fmt(r.balance):fmt(r.balance);
    doc.text(trPDF(balTxt), cols[4], y+0.5);
    y+=8;
  });
  hline(y-12); hline(y-4); y+=8;

  // ── DENKLEŞTİRME TABLOSU ──
  const odemeler=[];
  const borclu=[...s.results.map((r,i)=>({i,b:r.balance})).filter(x=>x.b<-0.01)].sort((a,b)=>a.b-b.b);
  const alacakli=[...s.results.map((r,i)=>({i,b:r.balance})).filter(x=>x.b>0.01)].sort((a,b)=>b.b-a.b);
  const bc2=borclu.map(x=>({...x,rem:-x.b}));
  const ac2=alacakli.map(x=>({...x,rem:x.b}));
  let bi=0,ai=0;
  while(bi<bc2.length&&ai<ac2.length){
    const m=Math.min(bc2[bi].rem,ac2[ai].rem);
    if(m>0.01) odemeler.push({from:bc2[bi].i,to:ac2[ai].i,amount:m});
    bc2[bi].rem-=m; ac2[ai].rem-=m;
    if(bc2[bi].rem<0.01)bi++; if(ac2[ai].rem<0.01)ai++;
  }

  if(odemeler.length>0){
    doc.setFont("helvetica","bold"); doc.setFontSize(9); tc(80,80,80);
    doc.text("DENKLESTIRME", ML, y); y+=5;
    fc(40,40,40); doc.rect(ML,y-4,CW,8,"F");
    doc.setFont("helvetica","bold"); doc.setFontSize(8); tc(255,255,255);
    doc.text("ODEYEN", ML+3, y+0.5);
    doc.text("ALAN", ML+70, y+0.5);
    doc.text("TUTAR", ML+140, y+0.5);
    y+=8;
    odemeler.forEach((o,ri)=>{
      if(ri%2===0){fc(248,248,248);doc.rect(ML,y-4,CW,8,"F");}
      doc.setFont("helvetica","normal"); doc.setFontSize(8.5); tc(30,30,30);
      doc.text(trPDF(names[o.from]), ML+3, y+0.5);
      doc.text(trPDF("→  "+names[o.to]), ML+70, y+0.5);
      doc.setFont("helvetica","bold"); tc(26,82,118);
      doc.text(trPDF(fmt(o.amount)), ML+140, y+0.5);
      y+=8;
    });
    hline(y-12); hline(y-4); y+=8;
  }

  // Footer s1
  doc.setFont("helvetica","normal"); doc.setFontSize(7); tc(180,180,180);
  doc.text(trPDF("Olusturulma: "+new Date().toLocaleDateString("tr-TR")+"  |  Madalyon Hukuk Burosu  |  Sayfa 1 / 2"), 105, 290, {align:"center"});

  // ══════════════════════════════
  // SAYFA 2 - KAYIT DETAYLARI
  // ══════════════════════════════
  if(donemData){
    doc.addPage();
    y=18;
    doc.setFont("helvetica","bold"); doc.setFontSize(14); tc(26,26,26);
    doc.text("KAYIT DETAYLARI", 105, y, {align:"center"});
    y+=5;
    doc.setFont("helvetica","normal"); doc.setFontSize(9); tc(120,120,120);
    doc.text(trPDF(title), 105, y, {align:"center"});
    y+=8; hline(y,0.5); y+=8;

    [0,1,2].forEach(pi=>{
      const entries = donemData[pi]||[];
      if(y>240){doc.addPage();y=18;}

      // Ortak başlığı
      fc(40,40,40); doc.rect(ML,y-5,CW,9,"F");
      doc.setFont("helvetica","bold"); doc.setFontSize(9); tc(255,255,255);
      doc.text(trPDF(names[pi].toUpperCase()), ML+3, y+0.5);
      const inc=entries.filter(e=>e.type==="gelir").reduce((s,e)=>s+e.amount,0);
      const exp=entries.filter(e=>e.type==="gider").reduce((s,e)=>s+e.amount,0);
      doc.text(trPDF("Gelir: "+fmtPDF(inc)+"   Gider: "+fmtPDF(exp)), RR-3, y+0.5, {align:"right"});
      y+=10;

      if(entries.length===0){
        doc.setFont("helvetica","normal"); doc.setFontSize(8); tc(160,160,160);
        doc.text("Kayit yok", ML+3, y); y+=8;
      } else {
        // Sütun başlıkları
        fc(220,220,220); doc.rect(ML,y-4,CW,7,"F");
        doc.setFont("helvetica","bold"); doc.setFontSize(7.5); tc(60,60,60);
        doc.text("TARIH", ML+3, y+0.5);
        doc.text("ACIKLAMA", ML+32, y+0.5);
        doc.text("TUR", ML+130, y+0.5);
        doc.text("TUTAR", RR-3, y+0.5, {align:"right"});
        y+=7;

        [...entries].reverse().forEach((e,ri)=>{
          if(y>280){doc.addPage();y=18;}
          if(ri%2===0){fc(250,250,250);doc.rect(ML,y-4,CW,7,"F");}
          doc.setFont("helvetica","normal"); doc.setFontSize(7.5);
          tc(100,100,100); doc.text(trPDF(e.date||""), ML+3, y+0.5);
          tc(30,30,30);
          const descTxt = trPDF(e.desc||"");
          doc.text(descTxt.length>45?descTxt.slice(0,44)+"...":descTxt, ML+32, y+0.5);
          const isGelir = e.type==="gelir";
          tc(isGelir?30:192, isGelir?132:57, isGelir?73:43);
          doc.text(trPDF(isGelir?"Gelir":"Gider"), ML+130, y+0.5);
          doc.setFont("helvetica","bold");
          doc.text(trPDF((isGelir?"+":"-")+fmtPDF(e.amount)), RR-3, y+0.5, {align:"right"});
          y+=7;
        });

        // Alt toplam
        hline(y-4,0.3);
        doc.setFont("helvetica","bold"); doc.setFontSize(8); tc(30,30,30);
        doc.text(trPDF("Toplam: "+entries.length+" kayit"), ML+3, y+1.5);
        tc(30,132,73); doc.text(trPDF("Gelir: "+fmtPDF(inc)), ML+60, y+1.5);
        tc(192,57,43); doc.text(trPDF("Gider: "+fmtPDF(exp)), ML+100, y+1.5);
        tc(26,82,118); doc.text(trPDF("Net: "+fmtPDF(inc-exp)), ML+142, y+1.5);
        y+=10;
      }
    });

    // Footer s2
    doc.setFont("helvetica","normal"); doc.setFontSize(7); tc(180,180,180);
    doc.text(trPDF("Olusturulma: "+new Date().toLocaleDateString("tr-TR")+"  |  Madalyon Hukuk Burosu  |  Sayfa 2 / 2"), 105, 290, {align:"center"});
  }

  return doc;
}
