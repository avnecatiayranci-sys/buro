<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Madalyon" />
  <title>Madalyon Hukuk Bürosu</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const firebaseConfig = {
      apiKey: "AIzaSyDGTijJZWADo26rjl1s_r1QSURhDeH_i6E",
      authDomain: "madalyon-hesap.firebaseapp.com",
      databaseURL: "https://madalyon-hesap-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "madalyon-hesap",
      storageBucket: "madalyon-hesap.firebasestorage.app",
      messagingSenderId: "1054387495626",
      appId: "1:1054387495626:web:3db7c0135f9f8965438a33"
    };
    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    window.__fbDb=db; window.__fbRef=ref; window.__fbSet=set; window.__fbOn=onValue;
    window.__fbReady=true; window.dispatchEvent(new Event("fb-ready"));
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:#f5f3ef; font-family:'Inter',sans-serif; color:#1a1a1a; }
    input { outline:none; font-family:'Inter',sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
    ::-webkit-scrollbar { width:0; }
    .playfair { font-family:'Playfair Display',serif; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const DEFAULT_NAMES = ["Yunus", "Batuhan", "Necati"];
const ACCENT = ["#c0392b","#1a5276","#1e8449"];
const LIGHT  = ["#fdf2f2","#f0f5fb","#f0faf3"];
const BORDER = ["#f5c6c2","#b8d4ed","#a9dfbf"];
const MONTHS = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran",
                "Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

const now = new Date();
const defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;

function fmt(n) {
  return n.toLocaleString("tr-TR",{minimumFractionDigits:2,maximumFractionDigits:2})+" ₺";
}
function monthLabel(ym) {
  const [y,m]=ym.split("-");
  return `${MONTHS[parseInt(m)-1]} ${y}`;
}
function fbSave(path,value) {
  if(!window.__fbReady) return;
  window.__fbSet(window.__fbRef(window.__fbDb,path),value);
}
function fbListen(path,cb) {
  if(!window.__fbReady) return ()=>{};
  return window.__fbOn(window.__fbRef(window.__fbDb,path),snap=>cb(snap.val()));
}

function BarChart({stats,names}) {
  const maxVal=Math.max(...stats.map(d=>Math.max(d.inc,d.exp)),1);
  return (
    <div style={{background:"#fff",borderRadius:14,padding:"18px 16px",
      boxShadow:"0 2px 8px rgba(0,0,0,0.04)",border:"1px solid #ede9e3",marginBottom:16}}>
      <div style={{fontSize:11,color:"#aaa",letterSpacing:2,fontWeight:600,marginBottom:16}}>
        GELİR / GİDER KARŞILAŞTIRMASI
      </div>
      <div style={{display:"flex",gap:6,alignItems:"flex-end",height:100}}>
        {stats.map((d,i)=>{
          const incH=Math.round((d.inc/maxVal)*90);
          const expH=Math.round((d.exp/maxVal)*90);
          return (
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <div style={{display:"flex",gap:3,alignItems:"flex-end",height:90}}>
                <div style={{width:14,background:"#1e8449",borderRadius:"3px 3px 0 0",height:incH||2}}/>
                <div style={{width:14,background:"#c0392b",borderRadius:"3px 3px 0 0",height:expH||2}}/>
              </div>
              <div style={{fontSize:10,color:"#888",textAlign:"center",fontWeight:500}}>
                {names[i].slice(0,4)}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:16,marginTop:12,justifyContent:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:10,height:10,borderRadius:2,background:"#1e8449"}}/>
          <span style={{fontSize:11,color:"#888"}}>Gelir</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:10,height:10,borderRadius:2,background:"#c0392b"}}/>
          <span style={{fontSize:11,color:"#888"}}>Gider</span>
        </div>
      </div>
    </div>
  );
}

function TrendChart({months,summaries}) {
  if(months.length<2) return null;
  const vals=summaries.map(s=>s.netShare);
  const maxV=Math.max(...vals,1),minV=Math.min(...vals,0);
  const range=maxV-minV||1;
  const W=300,H=80;
  const pts=vals.map((v,i)=>{
    const x=(i/(vals.length-1))*(W-20)+10;
    const y=H-((v-minV)/range)*(H-16)-8;
    return `${x},${y}`;
  });
  return (
    <div style={{background:"#fff",borderRadius:14,padding:"18px 16px",
      boxShadow:"0 2px 8px rgba(0,0,0,0.04)",border:"1px solid #ede9e3",marginBottom:16}}>
      <div style={{fontSize:11,color:"#aaa",letterSpacing:2,fontWeight:600,marginBottom:12}}>
        AYLIK NET TREND
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H}}>
        <defs>
          <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#1a5276" stopOpacity="0.15"/>
            <stop offset="100%" stopColor="#1a5276" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <polygon points={`10,${H} ${pts.join(" ")} ${W-10},${H}`} fill="url(#tg)"/>
        <polyline points={pts.join(" ")} fill="none" stroke="#1a5276" strokeWidth="2" strokeLinejoin="round"/>
        {pts.map((pt,i)=>{const [x,y]=pt.split(","); return <circle key={i} cx={x} cy={y} r="3" fill="#1a5276"/>;})}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        {months.map((m,i)=>(
          <div key={i} style={{fontSize:9,color:"#bbb",textAlign:"center"}}>
            {MONTHS[parseInt(m.split("-")[1])-1].slice(0,3)}
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [data,         setData]         = useState({});
  const [names,        setNames]        = useState(DEFAULT_NAMES);
  const [month,        setMonth]        = useState(defaultMonth);
  // screen: "home" | "ozet" | "ortak-0" | "ortak-1" | "ortak-2"
  const [screen,       setScreen]       = useState("home");
  const [subTab,       setSubTab]       = useState("kayitlar");
  const [form,         setForm]         = useState({type:"gelir",desc:"",amount:""});
  const [editingNames, setEditingNames] = useState(false);
  const [tempNames,    setTempNames]    = useState(DEFAULT_NAMES);
  const [fbReady,      setFbReady]      = useState(!!window.__fbReady);
  const [syncing,      setSyncing]      = useState(false);
  const [resetModal,   setResetModal]   = useState(false);
  const [resetConfirm, setResetConfirm] = useState("");
  const [toast,        setToast]        = useState(null);
  const [showArchive,  setShowArchive]  = useState(false);

  useEffect(()=>{
    function start(){
      setFbReady(true);
      const u1=fbListen("buro/data",v=>setData(v||{}));
      const u2=fbListen("buro/names",v=>{if(v){setNames(v);setTempNames(v);}});
      return ()=>{u1&&u1();u2&&u2();};
    }
    if(window.__fbReady) return start();
    const h=()=>start();
    window.addEventListener("fb-ready",h);
    return ()=>window.removeEventListener("fb-ready",h);
  },[]);

  function showToast(msg,color="#1e8449"){
    setToast({msg,color});
    setTimeout(()=>setToast(null),2500);
  }
  function saveData(nd){
    setSyncing(true); fbSave("buro/data",nd);
    setTimeout(()=>setSyncing(false),800);
  }
  function getEntries(i,m){return data?.[m]?.[i]||[];}
  function addEntry(pIdx){
    const amount=parseFloat(form.amount);
    if(!form.desc.trim()||isNaN(amount)||amount<=0) return;
    const entry={id:Date.now(),type:form.type,desc:form.desc.trim(),
                 amount,date:new Date().toLocaleDateString("tr-TR")};
    const nd=JSON.parse(JSON.stringify(data));
    if(!nd[month]) nd[month]={};
    if(!nd[month][pIdx]) nd[month][pIdx]=[];
    nd[month][pIdx].push(entry);
    setData(nd); saveData(nd);
    setForm({type:form.type,desc:"",amount:""});
    showToast(form.type==="gelir"?"✓ Gelir eklendi":"✓ Gider eklendi",
              form.type==="gelir"?"#1e8449":"#c0392b");
  }
  function delEntry(pIdx,id){
    const nd=JSON.parse(JSON.stringify(data));
    if(nd[month]?.[pIdx]) nd[month][pIdx]=nd[month][pIdx].filter(e=>e.id!==id);
    setData(nd); saveData(nd);
  }
  function doReset(){
    if(resetConfirm!=="SIFIRLA") return;
    const nd=JSON.parse(JSON.stringify(data));
    delete nd[month];
    setData(nd); saveData(nd);
    setResetModal(false); setResetConfirm("");
    showToast("🗑 "+monthLabel(month)+" verileri silindi","#c0392b");
  }
  function calcSummary(m){
    let totalIncome=0,totalExpense=0;
    const stats=[0,1,2].map(i=>{
      const inc=getEntries(i,m).filter(e=>e.type==="gelir").reduce((s,e)=>s+e.amount,0);
      const exp=getEntries(i,m).filter(e=>e.type==="gider").reduce((s,e)=>s+e.amount,0);
      totalIncome+=inc; totalExpense+=exp;
      return {inc,exp};
    });
    const netShare=totalIncome-totalExpense,perPerson=netShare/3;
    const results=[0,1,2].map(i=>({
      ...stats[i],
      toReceive:perPerson+stats[i].exp,
      balance:perPerson+stats[i].exp-stats[i].inc,
      perPerson
    }));
    return {totalIncome,totalExpense,netShare,perPerson,results,stats};
  }

  const allMonths=Object.keys(data).sort().reverse();
  const trendMonths=allMonths.slice(0,6).reverse();
  const trendSummaries=trendMonths.map(m=>calcSummary(m));
  const summary=calcSummary(month);
  const pIdx=screen.startsWith("ortak-")?parseInt(screen.split("-")[1]):null;

  function exportPDF(){
    const s=calcSummary(month);
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    doc.setFillColor(26,26,26); doc.rect(0,0,210,35,"F");
    doc.setTextColor(255,255,255); doc.setFontSize(18); doc.setFont("helvetica","bold");
    doc.text("MADALYON HUKUK BUROSU",105,15,{align:"center"});
    doc.setFontSize(11); doc.setFont("helvetica","normal");
    doc.text(monthLabel(month)+" - Ay Sonu Hesap Raporu",105,25,{align:"center"});
    let y=45;
    doc.setFillColor(245,243,239); doc.roundedRect(14,y,182,32,3,3,"F");
    doc.setFontSize(9); doc.setTextColor(100,100,100);
    doc.text("TOPLAM GELIR",30,y+8); doc.text("TOPLAM GIDER",85,y+8); doc.text("NET DAGITILACAK",140,y+8);
    doc.setFontSize(12); doc.setFont("helvetica","bold");
    doc.setTextColor(30,132,73); doc.text(fmt(s.totalIncome),30,y+20);
    doc.setTextColor(192,57,43); doc.text(fmt(s.totalExpense),85,y+20);
    doc.setTextColor(26,82,118); doc.text(fmt(s.netShare),140,y+20);
    y+=42;
    doc.setFontSize(10); doc.setFont("helvetica","normal"); doc.setTextColor(100,100,100);
    doc.text("Kisi basi net pay: "+fmt(s.perPerson),14,y); y+=12;
    [0,1,2].forEach(i=>{
      const r=s.results[i];
      const rgb=i===0?[253,242,242]:i===1?[240,245,251]:[240,250,243];
      doc.setFillColor(...rgb); doc.roundedRect(14,y,182,48,3,3,"F");
      doc.setFontSize(12); doc.setFont("helvetica","bold");
      const ac=i===0?[192,57,43]:i===1?[26,82,118]:[30,132,73];
      doc.setTextColor(...ac); doc.text(names[i],22,y+12);
      doc.setFontSize(9); doc.setFont("helvetica","normal"); doc.setTextColor(80,80,80);
      doc.text("Toplanan Gelir:",22,y+22); doc.text("Yapilan Gider:",22,y+30); doc.text("Toplam Alacagi:",22,y+38);
      doc.setFont("helvetica","bold");
      doc.setTextColor(30,132,73); doc.text(fmt(r.inc),90,y+22);
      doc.setTextColor(192,57,43); doc.text(fmt(r.exp),90,y+30);
      doc.setTextColor(26,82,118); doc.text(fmt(r.toReceive),90,y+38);
      const balTxt=r.balance>0.01?"Kasadan "+fmt(r.balance)+" alacak"
                  :r.balance<-0.01?"Kasaya "+fmt(Math.abs(r.balance))+" odeyecek":"Hesap tamam";
      const bc=r.balance>0.01?[30,132,73]:r.balance<-0.01?[192,57,43]:[100,100,100];
      doc.setTextColor(...bc); doc.text(balTxt,150,y+30,{align:"right"});
      y+=56;
    });
    doc.setFontSize(8); doc.setFont("helvetica","normal"); doc.setTextColor(180,180,180);
    doc.text("Olusturulma: "+new Date().toLocaleDateString("tr-TR")+" - Madalyon Hukuk Burosu",105,285,{align:"center"});
    doc.save("Madalyon_"+month+"_Rapor.pdf");
    showToast("📄 PDF indirildi");
  }

  // ── LOADING ──
  if(!fbReady) return (
    <div style={{minHeight:"100vh",background:"#f5f3ef",display:"flex",
      alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:44,marginBottom:12}}>⚖️</div>
        <div className="playfair" style={{fontSize:20,color:"#1a1a1a",marginBottom:6}}>Madalyon Hukuk Bürosu</div>
        <div style={{color:"#888",fontSize:13}}>Bağlanıyor...</div>
      </div>
    </div>
  );

  // ── ORTAK DETAY EKRANI ──
  if(screen.startsWith("ortak-")){
    const ac=ACCENT[pIdx],lt=LIGHT[pIdx],bd=BORDER[pIdx];
    const myEntries=getEntries(pIdx,month);
    const myInc=myEntries.filter(e=>e.type==="gelir").reduce((s,e)=>s+e.amount,0);
    const myExp=myEntries.filter(e=>e.type==="gider").reduce((s,e)=>s+e.amount,0);
    const r=summary.results[pIdx];
    return (
      <div style={{minHeight:"100vh",background:"#f5f3ef",paddingBottom:80}}>
        {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",
          background:toast.color,color:"#fff",padding:"10px 20px",borderRadius:20,
          fontSize:13,fontWeight:500,zIndex:999,boxShadow:"0 4px 16px rgba(0,0,0,0.15)",
          whiteSpace:"nowrap"}}>{toast.msg}</div>}

        {/* Header */}
        <div style={{background:"#fff",borderBottom:"1px solid #e8e4de",padding:"14px 16px 0",
          position:"sticky",top:0,zIndex:20,boxShadow:"0 1px 8px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <button onClick={()=>setScreen("home")}
              style={{background:"none",border:"none",color:ac,cursor:"pointer",
                fontSize:14,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
              ← Ana Ekran
            </button>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:32,height:32,borderRadius:"50%",background:lt,
                border:`2px solid ${bd}`,display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:14,color:ac,fontWeight:700}}>{names[pIdx][0]}</div>
              <div className="playfair" style={{fontSize:15,fontWeight:700,color:"#1a1a1a"}}>
                {names[pIdx]}
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4,
              background:"#f5f3ef",borderRadius:20,padding:"3px 8px"}}>
              <button onClick={()=>{
                const [y,m2]=month.split("-").map(Number);
                const d=new Date(y,m2-2);
                setMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
              }} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:18,padding:"0 2px"}}>‹</button>
              <span style={{fontSize:11,color:"#333",fontWeight:500,minWidth:80,textAlign:"center"}}>{monthLabel(month)}</span>
              <button onClick={()=>{
                const [y,m2]=month.split("-").map(Number);
                const d=new Date(y,m2);
                setMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
              }} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:18,padding:"0 2px"}}>›</button>
            </div>
          </div>
          <div style={{display:"flex",borderRadius:10,overflow:"hidden",
            border:"1px solid #ede9e3",marginBottom:12}}>
            {[["kayitlar","📝 Kayıtlar"],["hesap","⚖️ Hesabım"]].map(([k,lbl])=>(
              <button key={k} onClick={()=>setSubTab(k)} style={{
                flex:1,background:subTab===k?"#1a1a1a":"transparent",border:"none",
                color:subTab===k?"#fff":"#888",padding:"9px 4px",cursor:"pointer",
                fontSize:13,fontFamily:"Inter,sans-serif",fontWeight:subTab===k?600:400,
                transition:"all 0.15s"
              }}>{lbl}</button>
            ))}
          </div>
        </div>

        {/* Gelir/Gider mini bar */}
        <div style={{background:"#fff",borderBottom:"1px solid #ede9e3",padding:"12px 16px"}}>
          <div style={{display:"flex",gap:10}}>
            <div style={{flex:1,background:"#f0faf3",borderRadius:10,padding:"10px 14px",border:"1px solid #a9dfbf"}}>
              <div style={{fontSize:10,color:"#1e8449",letterSpacing:1,marginBottom:3,fontWeight:600}}>GELİR</div>
              <div style={{fontSize:17,fontWeight:700,color:"#1e8449"}}>{fmt(myInc)}</div>
            </div>
            <div style={{flex:1,background:"#fdf2f2",borderRadius:10,padding:"10px 14px",border:"1px solid #f5c6c2"}}>
              <div style={{fontSize:10,color:"#c0392b",letterSpacing:1,marginBottom:3,fontWeight:600}}>GİDER</div>
              <div style={{fontSize:17,fontWeight:700,color:"#c0392b"}}>{fmt(myExp)}</div>
            </div>
          </div>
        </div>

        {/* Kayıtlar */}
        {subTab==="kayitlar"&&(
          <div style={{padding:16}}>
            <div style={{background:"#fff",border:`1px solid ${bd}`,borderRadius:14,
              padding:16,marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
              <div style={{fontSize:11,color:ac,letterSpacing:2,marginBottom:12,fontWeight:600}}>
                YENİ KAYIT
              </div>
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                {["gelir","gider"].map(t=>(
                  <button key={t} onClick={()=>setForm({...form,type:t})} style={{
                    flex:1,padding:"10px",borderRadius:8,cursor:"pointer",
                    border:form.type===t?(t==="gelir"?"2px solid #1e8449":"2px solid #c0392b"):"2px solid #ede9e3",
                    background:form.type===t?(t==="gelir"?"#f0faf3":"#fdf2f2"):"#f9f8f6",
                    color:form.type===t?(t==="gelir"?"#1e8449":"#c0392b"):"#aaa",
                    fontFamily:"Inter,sans-serif",fontSize:14,fontWeight:500,transition:"all 0.15s"
                  }}>{t==="gelir"?"↑ Gelir":"↓ Gider"}</button>
                ))}
              </div>
              <input value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})}
                placeholder="Açıklama (örn: Dava ücreti, Kırtasiye...)"
                style={{width:"100%",background:"#f9f8f6",border:"1px solid #ede9e3",
                  borderRadius:8,padding:"11px 13px",color:"#1a1a1a",fontSize:14,marginBottom:10}}/>
              <div style={{display:"flex",gap:10}}>
                <input value={form.amount} type="number"
                  onChange={e=>setForm({...form,amount:e.target.value})}
                  onKeyDown={e=>{if(e.key==="Enter")addEntry(pIdx);}}
                  placeholder="Tutar (₺)"
                  style={{flex:1,background:"#f9f8f6",border:"1px solid #ede9e3",
                    borderRadius:8,padding:"11px 13px",color:"#1a1a1a",fontSize:14}}/>
                <button onClick={()=>addEntry(pIdx)} style={{
                  background:ac,border:"none",borderRadius:8,padding:"11px 22px",
                  color:"#fff",cursor:"pointer",fontSize:22,fontWeight:"bold",
                  boxShadow:`0 4px 12px ${ac}44`}}>+</button>
              </div>
            </div>
            <div style={{fontSize:11,color:"#aaa",letterSpacing:2,marginBottom:12,fontWeight:600}}>
              {monthLabel(month).toUpperCase()} KAYITLARI
            </div>
            {myEntries.length===0&&(
              <div style={{textAlign:"center",padding:"50px 0",color:"#ccc",fontSize:14}}>Henüz kayıt yok</div>
            )}
            {[...myEntries].reverse().map(entry=>(
              <div key={entry.id} style={{
                background:"#fff",
                borderLeft:`3px solid ${entry.type==="gelir"?"#1e8449":"#c0392b"}`,
                borderRadius:"0 10px 10px 0",padding:"12px 16px",marginBottom:8,
                display:"flex",justifyContent:"space-between",alignItems:"center",
                boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
                <div>

              </div>
            ))}
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button onClick={()=>{setNames(tempNames);setEditingNames(false);
                fbSave("buro/names",tempNames);showToast("✓ İsimler güncellendi");}}
                style={{flex:1,background:"#1a1a1a",border:"none",borderRadius:10,
                  padding:13,color:"#fff",cursor:"pointer",fontSize:14,fontWeight:600}}>Kaydet</button>
              <button onClick={()=>{setEditingNames(false);setTempNames(names);}}
                style={{flex:1,background:"#f5f3ef",border:"none",borderRadius:10,
                  padding:13,color:"#555",cursor:"pointer",fontSize:14}}>İptal</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
