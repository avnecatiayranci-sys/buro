<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const DEFAULT_NAMES = ["Yunus", "Batuhan", "Necati"];
const ACCENT = ["#c0392b","#1a5276","#1e8449"];
const LIGHT  = ["#fdf2f2","#f0f5fb","#f0faf3"];
const BORDER = ["#f5c6c2","#b8d4ed","#a9dfbf"];
const MONTHS = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran",
                "Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

const now = new Date();
const defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;

function fmt(n) {
  return n.toLocaleString("tr-TR",{minimumFractionDigits:2,maximumFractionDigits:2})+" ₺";
}
function fmtPDF(n) {
  return n.toLocaleString("tr-TR",{minimumFractionDigits:2,maximumFractionDigits:2})+" TL";
}
function trPDF(s) {
  return String(s)
    .replace(/İ/g,"I").replace(/ı/g,"i")
    .replace(/Ğ/g,"G").replace(/ğ/g,"g")
    .replace(/Ü/g,"U").replace(/ü/g,"u")
    .replace(/Ş/g,"S").replace(/ş/g,"s")
    .replace(/Ö/g,"O").replace(/ö/g,"o")
    .replace(/Ç/g,"C").replace(/ç/g,"c")
    .replace(/₺/g,"TL");
}
function nowStr(){return new Date().toLocaleDateString("tr-TR")+" "+new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});}
function todayStr(){return new Date().toLocaleDateString("tr-TR");}
function monthLabel(ym) {
  const [y,m]=ym.split("-");
  return `${MONTHS[parseInt(m)-1]} ${y}`;
}
function fbSave(path,value) {
  if(!window.__fbReady) return;
  window.__fbSet(window.__fbRef(window.__fbDb,path),value);
}
function fbListen(path,cb) {
  if(!window.__fbReady) return ()=>{};
  return window.__fbOn(window.__fbRef(window.__fbDb,path),snap=>cb(snap.val()));
}

function BarChart({stats,names}) {
  const maxVal=Math.max(...stats.map(d=>Math.max(d.inc,d.exp)),1);
  return (
    <div style={{background:"#fff",borderRadius:14,padding:"18px 16px",
      boxShadow:"0 2px 8px rgba(0,0,0,0.04)",border:"1px solid #ede9e3",marginBottom:16}}>
      <div style={{fontSize:11,color:"#aaa",letterSpacing:2,fontWeight:600,marginBottom:16}}>
        GELİR / GİDER KARŞILAŞTIRMASI
      </div>
      <div style={{display:"flex",gap:6,alignItems:"flex-end",height:100}}>
        {stats.map((d,i)=>{
          const incH=Math.round((d.inc/maxVal)*90);
          const expH=Math.round((d.exp/maxVal)*90);
          return (
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <div style={{display:"flex",gap:3,alignItems:"flex-end",height:90}}>
                <div style={{width:14,background:"#1e8449",borderRadius:"3px 3px 0 0",height:incH||2}}/>
                <div style={{width:14,background:"#c0392b",borderRadius:"3px 3px 0 0",height:expH||2}}/>
              </div>
              <div style={{fontSize:10,color:"#888",textAlign:"center",fontWeight:500}}>
                {names[i].slice(0,4)}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:16,marginTop:12,justifyContent:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:10,height:10,borderRadius:2,background:"#1e8449"}}/>
          <span style={{fontSize:11,color:"#888"}}>Gelir</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:10,height:10,borderRadius:2,background:"#c0392b"}}/>
          <span style={{fontSize:11,color:"#888"}}>Gider</span>
        </div>
      </div>
    </div>
  );
}

function TrendChart({months,summaries}) {
  if(months.length<2) return null;
  const vals=summaries.map(s=>s.netShare);
  const maxV=Math.max(...vals,1),minV=Math.min(...vals,0);
  const range=maxV-minV||1;
  const W=300,H=80;
  const pts=vals.map((v,i)=>{
    const x=(i/(vals.length-1))*(W-20)+10;
    const y=H-((v-minV)/range)*(H-16)-8;
    return `${x},${y}`;
  });
  return (
    <div style={{background:"#fff",borderRadius:14,padding:"18px 16px",
      boxShadow:"0 2px 8px rgba(0,0,0,0.04)",border:"1px solid #ede9e3",marginBottom:16}}>
      <div style={{fontSize:11,color:"#aaa",letterSpacing:2,fontWeight:600,marginBottom:12}}>
        AYLIK NET TREND
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H}}>
        <defs>
          <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#1a5276" stopOpacity="0.15"/>
            <stop offset="100%" stopColor="#1a5276" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <polygon points={`10,${H} ${pts.join(" ")} ${W-10},${H}`} fill="url(#tg)"/>
        <polyline points={pts.join(" ")} fill="none" stroke="#1a5276" strokeWidth="2" strokeLinejoin="round"/>
        {pts.map((pt,i)=>{const [x,y]=pt.split(","); return <circle key={i} cx={x} cy={y} r="3" fill="#1a5276"/>;})}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        {months.map((m,i)=>(
          <div key={i} style={{fontSize:9,color:"#bbb",textAlign:"center"}}>
            {MONTHS[parseInt(m.split("-")[1])-1].slice(0,3)}
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [donemler,     setDonemler]     = useState(null);
  const [names,        setNames]        = useState(DEFAULT_NAMES);
  const [screen,       setScreen]       = useState("home");
  const [subTab,       setSubTab]       = useState("kayitlar");
  const [form,         setForm]         = useState({type:"gelir",desc:"",amount:""});
  const [editingNames, setEditingNames] = useState(false);
  const [tempNames,    setTempNames]    = useState(DEFAULT_NAMES);
  const [fbReady,      setFbReady]      = useState(!!window.__fbReady);
  const [syncing,      setSyncing]      = useState(false);
  const [resetModal,   setResetModal]   = useState(false);
  const [resetConfirm, setResetConfirm] = useState("");
  const [toast,        setToast]        = useState(null);
  const [showArchive,  setShowArchive]  = useState(false);
  const [showNewDonem,     setShowNewDonem]     = useState(false);
  const [newDonemName,     setNewDonemName]     = useState("");
  const [showCloseConfirm, setShowCloseConfirm] = useState(false);
  const [editingEntry,  setEditingEntry]  = useState(null); // {pIdx, entry}
  const [editForm,      setEditForm]      = useState({desc:"",amount:""});

  const [eskiVeri,     setEskiVeri]     = useState(null);
  const [showMigrate,  setShowMigrate]  = useState(false);

  const aktifDonem = donemler ? (donemler.find(d=>!d.closed) || donemler[donemler.length-1] || null) : null;

  function eskiVeriAktar(birlesik){
    if(!eskiVeri) return;
    const MONTHS_=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
    const aylar=Object.keys(eskiVeri).sort();
    if(birlesik){
      // Tüm ayları tek dönemde birleştir
      const mergedData={};
      aylar.forEach(ay=>{
        [0,1,2].forEach(i=>{
          const entries=eskiVeri[ay]?.[i]||[];
          if(!mergedData[i])mergedData[i]=[];
          mergedData[i]=[...mergedData[i],...entries];
        });
      });
      const donem={id:"donem_"+Date.now(),name:"Aktarılan Kayıtlar",startDate:aylar[0],endDate:null,closed:false,createdAt:Date.now(),data:mergedData};
      fbSave("buro/donemler/"+donem.id,donem);
      setDonemler([donem]);
    } else {
      // Her ay ayrı dönem
      const yeniDonemler=aylar.map((ay,idx)=>{
        const [y,m]=ay.split("-");
        const label=MONTHS_[parseInt(m)-1]+" "+y;
        return{id:"donem_"+Date.now()+"_"+idx,name:label,startDate:ay+"-01",endDate:ay+"-28",closed:true,createdAt:Date.now()+idx,data:eskiVeri[ay]||{}};
      });
      if(yeniDonemler.length>0){yeniDonemler[yeniDonemler.length-1].closed=false;yeniDonemler[yeniDonemler.length-1].endDate=null;}
      yeniDonemler.forEach(d=>fbSave("buro/donemler/"+d.id,d));
      setDonemler(yeniDonemler);
    }
    setShowMigrate(false);setEskiVeri(null);
    showToast("✅ Eski veriler aktarıldı!","#1a5276");
  }

  useEffect(()=>{
    function start(){
      setFbReady(true);
      const u1=fbListen("buro/donemler",v=>{
        if(v){
          const arr=Object.entries(v).map(([id,val])=>({id,...val}));
          arr.sort((a,b)=>a.createdAt-b.createdAt);
          setDonemler(arr);
        } else {
          // Dönem yok - eski buro/data var mı kontrol et
          window.__fbOn(window.__fbRef(window.__fbDb,"buro/data"), snap=>{
            const oldData=snap.val();
            if(oldData && Object.keys(oldData).length>0){
              setEskiVeri(oldData);
              setShowMigrate(true);
              setDonemler([]);
            } else {
              const ilk={id:"donem_"+Date.now(),name:"İlk Dönem",startDate:todayStr(),endDate:null,closed:false,createdAt:Date.now(),data:{}};
              fbSave("buro/donemler/"+ilk.id,ilk);setDonemler([ilk]);
            }
          });
        }
      });
      const u2=fbListen("buro/names",v=>{if(v){setNames(v);setTempNames(v);}});
      return ()=>{u1&&u1();u2&&u2();};
    }
    if(window.__fbReady) return start();
    const h=()=>start();
    window.addEventListener("fb-ready",h);
    return ()=>window.removeEventListener("fb-ready",h);
  },[]);

  function showToast(msg,color="#1e8449"){
    setToast({msg,color});
    setTimeout(()=>setToast(null),2800);
  }
  function saveDonem(d){setSyncing(true);fbSave("buro/donemler/"+d.id,d);setTimeout(()=>setSyncing(false),800);}
  function getEntries(pIdx){return aktifDonem?.data?.[pIdx]||[];}
  function getEntriesOf(d,pIdx){return d?.data?.[pIdx]||[];}

  function calcSummary(d){
    let ti=0,te=0;
    const stats=[0,1,2].map(i=>{
      const inc=getEntriesOf(d,i).filter(e=>e.type==="gelir").reduce((s,e)=>s+e.amount,0);
      const exp=getEntriesOf(d,i).filter(e=>e.type==="gider").reduce((s,e)=>s+e.amount,0);
      ti+=inc;te+=exp;return{inc,exp};
    });
    const net=ti-te,pp=net/3;
    return{totalIncome:ti,totalExpense:te,netShare:net,perPerson:pp,stats,
      results:[0,1,2].map(i=>({...stats[i],toReceive:pp+stats[i].exp,balance:pp+stats[i].exp-stats[i].inc,perPerson:pp}))};
  }
  const emptySummary={totalIncome:0,totalExpense:0,netShare:0,perPerson:0,stats:[{inc:0,exp:0},{inc:0,exp:0},{inc:0,exp:0}],results:[0,1,2].map(()=>({inc:0,exp:0,toReceive:0,balance:0,perPerson:0}))};
  const summary=aktifDonem?calcSummary(aktifDonem):emptySummary;
  const pIdx=screen.startsWith("ortak-")?parseInt(screen.split("-")[1]):null;

  function addEntry(pIdx){
    if(!aktifDonem||aktifDonem.closed)return;
    const amount=parseFloat(form.amount);
    if(!form.desc.trim()||isNaN(amount)||amount<=0)return;
    const entry={id:Date.now(),type:form.type,desc:form.desc.trim(),amount,date:nowStr()};
    const nd=JSON.parse(JSON.stringify(aktifDonem));
    if(!nd.data)nd.data={};if(!nd.data[pIdx])nd.data[pIdx]=[];nd.data[pIdx].push(entry);
    saveDonem(nd);setDonemler(donemler.map(d=>d.id===nd.id?nd:d));
    setForm({type:form.type,desc:"",amount:""});
    showToast(form.type==="gelir"?"✓ Gelir eklendi":"✓ Gider eklendi",form.type==="gelir"?"#1e8449":"#c0392b");
  }
  function delEntry(pIdx,id){
    if(!aktifDonem||aktifDonem.closed)return;
    const nd=JSON.parse(JSON.stringify(aktifDonem));
    if(nd.data?.[pIdx])nd.data[pIdx]=nd.data[pIdx].filter(e=>e.id!==id);
    saveDonem(nd);setDonemler(donemler.map(d=>d.id===nd.id?nd:d));
  }
  function editEntry(pIdx, entry){
    setEditingEntry({pIdx, entry});
    setEditForm({desc:entry.desc, amount:String(entry.amount)});
  }
  function saveEditEntry(){
    if(!editingEntry||!aktifDonem||aktifDonem.closed)return;
    const amount=parseFloat(editForm.amount);
    if(!editForm.desc.trim()||isNaN(amount)||amount<=0)return;
    const nd=JSON.parse(JSON.stringify(aktifDonem));
    const {pIdx,entry}=editingEntry;
    if(nd.data?.[pIdx]){
      nd.data[pIdx]=nd.data[pIdx].map(e=>e.id===entry.id?{...e,desc:editForm.desc.trim(),amount}:e);
    }
    saveDonem(nd);setDonemler(donemler.map(d=>d.id===nd.id?nd:d));
    setEditingEntry(null);showToast("✓ Kayıt güncellendi");
  }

  function calcDenklesme(results,names){
    // Borçlular (balance < 0) alacaklılara (balance > 0) öder
    const odemeler=[];
    const borclu=[...results.map((r,i)=>({i,b:r.balance})).filter(x=>x.b<-0.01)].sort((a,b)=>a.b-b.b);
    const alacakli=[...results.map((r,i)=>({i,b:r.balance})).filter(x=>x.b>0.01)].sort((a,b)=>b.b-a.b);
    const bc=borclu.map(x=>({...x,rem:-x.b}));
    const ac=alacakli.map(x=>({...x,rem:x.b}));
    let bi=0,ai=0;
    while(bi<bc.length&&ai<ac.length){
      const miktar=Math.min(bc[bi].rem,ac[ai].rem);
      if(miktar>0.01) odemeler.push({from:bc[bi].i,to:ac[ai].i,amount:miktar});
      bc[bi].rem-=miktar; ac[ai].rem-=miktar;
      if(bc[bi].rem<0.01)bi++;
      if(ac[ai].rem<0.01)ai++;
    }
    return odemeler;
  }

  // Tüm dönemlerdeki tüm açıklamaları topla (öneri için)
  function getOneriler(){
    const set=new Set();
    if(!donemler)return[];
    donemler.forEach(d=>{
      [0,1,2].forEach(i=>{
        (d.data?.[i]||[]).forEach(e=>{if(e.desc)set.add(e.desc);});
      });
    });
    return [...set];
  }

  function doReset(){
    if(resetConfirm!=="SIFIRLA")return;
    const nd={...aktifDonem,data:{}};saveDonem(nd);setDonemler(donemler.map(d=>d.id===nd.id?nd:d));
    setResetModal(false);setResetConfirm("");showToast("🗑 Dönem verileri silindi","#c0392b");
  }
  function yeniDonemAc(){
    if(!newDonemName.trim())return;
    const yeni={id:"donem_"+Date.now(),name:newDonemName.trim(),startDate:todayStr(),endDate:null,closed:false,createdAt:Date.now(),data:{}};
    fbSave("buro/donemler/"+yeni.id,yeni);setDonemler([...donemler,yeni]);
    setShowNewDonem(false);setNewDonemName("");showToast("✓ Yeni dönem: "+yeni.name);
  }
  function donemKapat(){
    if(!aktifDonem)return;
    const s=calcSummary(aktifDonem);
    const dates=aktifDonem.startDate+" - "+todayStr();
    buildPDF(aktifDonem.name,dates,names,s,false).save("Madalyon_"+aktifDonem.name.replace(/\s+/g,"_")+".pdf");
    const nd={...aktifDonem,closed:true,endDate:todayStr()};
    saveDonem(nd);setDonemler(donemler.map(d=>d.id===nd.id?nd:d));
    setShowCloseConfirm(false);showToast("✅ Dönem kapatıldı, PDF indirildi","#1a5276");setScreen("home");
  }
  function exportPDFAktif(){
    if(!aktifDonem)return;
    const s=calcSummary(aktifDonem);
    const dates=aktifDonem.startDate+" - "+(aktifDonem.endDate||"Devam ediyor");
    buildPDF(aktifDonem.name,dates,names,s,aktifDonem.closed).save("Madalyon_"+aktifDonem.name.replace(/\s+/g,"_")+".pdf");
    showToast("📄 PDF indirildi");
  }
  function exportPDFDonem(d){
    const s=calcSummary(d);
    const dates=d.startDate+" - "+(d.endDate||"Devam ediyor");
    buildPDF(d.name,dates,names,s,d.closed).save("Madalyon_"+d.name.replace(/\s+/g,"_")+".pdf");
    showToast("📄 PDF indirildi");
  }

  function buildPDF(title, dates, names, s, isClosed){
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const ML=14,CW=182;
    const tc=(r,g,b)=>doc.setTextColor(r,g,b);
    const fc=(r,g,b)=>doc.setFillColor(r,g,b);
    let y=0;
    // Header
    fc(26,26,26);doc.rect(0,0,210,32,"F");
    tc(255,255,255);doc.setFont("helvetica","bold");doc.setFontSize(13);
    doc.text(trPDF("MADALYON HUKUK BUROSU"),105,12,{align:"center"});
    doc.setFont("helvetica","normal");doc.setFontSize(8.5);tc(180,180,180);
    doc.text(title+"   |   "+dates,105,21,{align:"center"});
    if(isClosed){fc(30,132,73);doc.roundedRect(86,25,38,6,2,2,"F");tc(255,255,255);doc.setFontSize(6.5);doc.setFont("helvetica","bold");doc.text(trPDF("KAPALI DONEM"),105,29.5,{align:"center"});}
    y=40;
    // Özet
    fc(245,243,239);doc.roundedRect(ML,y,CW,26,3,3,"F");
    doc.setDrawColor(220,216,210);doc.setLineWidth(0.3);doc.roundedRect(ML,y,CW,26,3,3,"S");
    const thirds=CW/3;
    [{lbl:"TOPLAM GELIR",val:fmtPDF(s.totalIncome),rgb:[30,132,73],cx:ML+thirds*0.5},
     {lbl:"TOPLAM GIDER",val:fmtPDF(s.totalExpense),rgb:[192,57,43],cx:ML+thirds*1.5},
     {lbl:"NET DAGITILACAK",val:fmtPDF(s.netShare),rgb:[26,82,118],cx:ML+thirds*2.5}
    ].forEach(({lbl,val,rgb,cx})=>{
      doc.setFont("helvetica","normal");doc.setFontSize(6.5);tc(140,140,140);doc.text(lbl,cx,y+8,{align:"center"});
      doc.setFont("helvetica","bold");doc.setFontSize(9.5);tc(...rgb);doc.text(val,cx,y+19,{align:"center"});
    });
    doc.setDrawColor(210,206,200);doc.line(ML+thirds,y+4,ML+thirds,y+22);doc.line(ML+thirds*2,y+4,ML+thirds*2,y+22);
    y+=32;
    doc.setFont("helvetica","normal");doc.setFontSize(8);tc(120,120,120);
    doc.text(trPDF("Kisi basi net pay:  ")+fmtPDF(s.perPerson),ML,y);y+=10;
    // Ortak kartları
    const CARD_H=52;
    [0,1,2].forEach(i=>{
      const r=s.results[i];
      const bgRGB=i===0?[253,242,242]:i===1?[240,245,251]:[240,250,243];
      const acRGB=i===0?[192,57,43]:i===1?[26,82,118]:[30,132,73];
      const bdRGB=i===0?[245,198,194]:i===1?[184,212,237]:[169,223,191];
      fc(...bgRGB);doc.roundedRect(ML,y,CW,CARD_H,3,3,"F");
      doc.setDrawColor(...bdRGB);doc.setLineWidth(0.4);doc.roundedRect(ML,y,CW,CARD_H,3,3,"S");
      fc(...acRGB);doc.circle(ML+10,y+CARD_H/2,7,"F");

                    ["Alacağı",fmtPDF(r.toReceive),"#d4ac0d"]].map(([lbl,val,col])=>(
                    <div key={lbl} style={{flex:1,background:"#f9f8f6",borderRadius:8,
                      padding:"8px 10px",border:"1px solid #ede9e3"}}>
                      <div style={{fontSize:10,color:"#aaa",marginBottom:3}}>{lbl}</div>
                      <div style={{color:col,fontWeight:600,fontSize:11}}>{val}</div>
                    </div>
                  ))}
                </div>
                <div style={{padding:"8px 12px",borderRadius:8,fontSize:13,textAlign:"center",fontWeight:500,
                  background:r.balance>0.01?"#f0faf3":r.balance<-0.01?"#fdf2f2":"#f9f8f6",
                  color:r.balance>0.01?"#1e8449":r.balance<-0.01?"#c0392b":"#888",
                  border:`1px solid ${r.balance>0.01?"#a9dfbf":r.balance<-0.01?"#f5c6c2":"#ede9e3"}`}}>
                  {r.balance>0.01?`Kasadan ${fmtPDF(r.balance)} alacak`
                   :r.balance<-0.01?`Kasaya ${fmtPDF(Math.abs(r.balance))} ödeyecek`
                   :"Hesap tamam ✓"}
                </div>
              </div>
            );
          })}

          {/* Denkleştirme */}
          {(()=>{
            const odemeler=calcDenklesme(summary.results,names);
            if(odemeler.length===0)return null;
            return(
              <div style={{background:"#fff",borderRadius:14,padding:"16px 18px",marginBottom:16,
                border:"1px solid #b8d4ed",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
                <div style={{fontSize:11,color:"#1a5276",letterSpacing:2,fontWeight:600,marginBottom:14}}>

                {odemeler.map((o,idx)=>(
                  <div key={idx} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                    padding:"10px 14px",borderRadius:10,marginBottom:8,
                    background:"#f0f5fb",border:"1px solid #b8d4ed"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:30,height:30,borderRadius:"50%",background:LIGHT[o.from],
                        border:`2px solid ${BORDER[o.from]}`,display:"flex",alignItems:"center",
                        justifyContent:"center",fontSize:12,color:ACCENT[o.from],fontWeight:700}}>
                        {names[o.from][0]}
                      </div>
                      <span style={{fontSize:13,color:"#888"}}>→</span>
                      <div style={{width:30,height:30,borderRadius:"50%",background:LIGHT[o.to],
                        border:`2px solid ${BORDER[o.to]}`,display:"flex",alignItems:"center",
                        justifyContent:"center",fontSize:12,color:ACCENT[o.to],fontWeight:700}}>
                        {names[o.to][0]}
                      </div>
                      <div style={{fontSize:13,color:"#1a1a1a"}}>
                        <span style={{fontWeight:600}}>{names[o.from]}</span>
                        <span style={{color:"#888"}}> → </span>
                        <span style={{fontWeight:600}}>{names[o.to]}</span>
                      </div>
                    </div>
                    <div style={{fontSize:15,fontWeight:700,color:"#1a5276"}}>{fmt(o.amount)}</div>
                  </div>
                ))}
              </div>
            );
          })()}

          {/* PDF butonu */}
          <button onClick={exportPDFAktif} style={{
            width:"100%",background:"#1a5276",border:"none",borderRadius:12,
            padding:"14px",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:600,
            marginBottom:10,boxShadow:"0 4px 12px rgba(26,82,118,0.3)"}}>
            📄 PDF İndir
          </button>
          {!aktifDonem?.closed&&(
            <button onClick={()=>setShowCloseConfirm(true)} style={{
              width:"100%",background:"#fff",border:"2px solid #c0392b",borderRadius:12,
              padding:"14px",color:"#c0392b",cursor:"pointer",fontSize:14,fontWeight:600}}>
              🔒 Dönemi Kapat ve Hesapla
            </button>
          )}
        </div>

        {/* ARŞİV */}
        {showArchive&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",
            display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}}>
            <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"24px 20px",
              width:"100%",maxWidth:480,maxHeight:"75vh",display:"flex",flexDirection:"column",
              boxShadow:"0 -8px 40px rgba(0,0,0,0.2)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                <div className="playfair" style={{fontSize:17,fontWeight:700}}>📅 Dönem Arşivi</div>
                <button onClick={()=>setShowArchive(false)}
                  style={{background:"none",border:"none",fontSize:22,color:"#aaa",cursor:"pointer"}}>×</button>
              </div>
              <div style={{overflowY:"auto",flex:1}}>
                {(!donemler||donemler.length===0)&&(
                  <div style={{textAlign:"center",color:"#ccc",padding:"30px 0",fontSize:14}}>Kayıtlı dönem yok</div>

                {donemler&&[...donemler].reverse().map(d=>{
                  const s=calcSummary(d);const isAktif=!d.closed;
                  return(
                    <div key={d.id} style={{background:isAktif?"#f0faf3":"#f9f8f6",border:`1px solid ${isAktif?"#a9dfbf":"#ede9e3"}`,borderRadius:12,padding:"14px 16px",marginBottom:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                        <div>
                          <div className="playfair" style={{fontSize:15,fontWeight:600}}>{d.name}</div>
                          <div style={{fontSize:11,color:"#aaa"}}>{d.startDate}{d.endDate?" → "+d.endDate:""}</div>
                        </div>
                        <div style={{display:"flex",gap:6,alignItems:"center"}}>
                          <div style={{fontSize:11,color:isAktif?"#1e8449":"#888",fontWeight:600}}>{isAktif?"🟢 Aktif":"🔒 Kapalı"}</div>
                          <button onClick={()=>exportPDFDonem(d)} style={{background:"none",border:"1px solid #b8d4ed",borderRadius:8,color:"#1a5276",padding:"4px 8px",cursor:"pointer",fontSize:11}}>PDF</button>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:12}}>
                        <span style={{fontSize:12,color:"#1e8449",fontWeight:600}}>{fmtPDF(s.totalIncome)}</span>
                        <span style={{fontSize:12,color:"#c0392b"}}>−{fmtPDF(s.totalExpense)}</span>
                        <span style={{fontSize:12,color:"#1a5276"}}>Net: {fmtPDF(s.netShare)}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* DÖNEM KAPAT */}
        {showCloseConfirm&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
            <div style={{background:"#fff",borderRadius:20,padding:28,width:"90%",maxWidth:340,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
              <div style={{fontSize:32,textAlign:"center",marginBottom:10}}>🔒</div>
              <div className="playfair" style={{fontSize:18,fontWeight:700,textAlign:"center",marginBottom:8}}>Dönemi Kapat</div>
              <div style={{fontSize:13,color:"#888",textAlign:"center",marginBottom:12,lineHeight:1.7}}><strong style={{color:"#1a1a1a"}}>{aktifDonem?.name}</strong> dönemi kapatılacak.</div>
              <div style={{background:"#f0faf3",border:"1px solid #a9dfbf",borderRadius:10,padding:"12px 14px",marginBottom:20,fontSize:13,lineHeight:1.8}}>
                ✅ PDF raporu otomatik indirilecek<br/>
                ✅ Dönem kilitlenecek (yeni kayıt girilmez)<br/>
                ✅ Arşivde görüntülenmeye devam eder
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={donemKapat} style={{flex:1,background:"#c0392b",border:"none",borderRadius:10,padding:13,color:"#fff",cursor:"pointer",fontSize:14,fontWeight:600}}>Onayla ve Kapat</button>

              </div>
            </div>
          </div>
        )}

        {/* SIFIRLAMA */}
        {resetModal&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",
            display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
            <div style={{background:"#fff",borderRadius:20,padding:28,
              width:"90%",maxWidth:340,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
              <div style={{fontSize:32,textAlign:"center",marginBottom:10}}>⚠️</div>

                marginBottom:8}}>Veri Sıfırlama</div>
              <div style={{fontSize:13,color:"#888",textAlign:"center",marginBottom:20,lineHeight:1.7}}>
                <strong style={{color:"#c0392b"}}>{aktifDonem?.name}</strong> dönemindeki tüm
                kayıtlar silinecek.<br/>Devam için <strong>SIFIRLA</strong> yazın.
              </div>
              <input value={resetConfirm}
                onChange={e=>setResetConfirm(e.target.value.toUpperCase())}

                style={{width:"100%",background:"#f9f8f6",border:"1px solid #ede9e3",
                  borderRadius:8,padding:"11px 13px",fontSize:14,marginBottom:14,
                  textAlign:"center",letterSpacing:2}}/>

                <button onClick={doReset} disabled={resetConfirm!=="SIFIRLA"}
                  style={{flex:1,background:resetConfirm==="SIFIRLA"?"#c0392b":"#f5c6c2",
                    border:"none",borderRadius:10,padding:13,color:"#fff",
                    cursor:resetConfirm==="SIFIRLA"?"pointer":"not-allowed",
                    fontSize:14,fontWeight:600}}>Sıfırla</button>
                <button onClick={()=>{setResetModal(false);setResetConfirm("");}}
                  style={{flex:1,background:"#f5f3ef",border:"none",borderRadius:10,
                    padding:13,color:"#555",cursor:"pointer",fontSize:14}}>İptal</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ══════════════════════════════════════
  // ANA EKRAN
  // ══════════════════════════════════════
  return (
    <div style={{minHeight:"100vh",background:"#f5f3ef"}}>
      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",
        background:toast.color,color:"#fff",padding:"10px 20px",borderRadius:20,
        fontSize:13,fontWeight:500,zIndex:999,boxShadow:"0 4px 16px rgba(0,0,0,0.15)",
        whiteSpace:"nowrap"}}>{toast.msg}</div>}

      {/* Ana ekran header */}
      <div style={{background:"#1a1a1a",padding:"48px 24px 36px",
        position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:-30,top:-30,fontSize:120,opacity:0.04}}>⚖️</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div className="playfair" style={{fontSize:26,fontWeight:700,color:"#fff",
              letterSpacing:0.5,lineHeight:1.2}}>MADALYON</div>
            <div style={{fontSize:11,color:"#888",letterSpacing:3,marginTop:3}}>HUKUK BÜROSU</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>{setEditingNames(true);setTempNames(names);}}
              style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.15)",
                borderRadius:8,color:"#aaa",padding:"6px 10px",cursor:"pointer",fontSize:12}}>✏️</button>
          </div>
        </div>

        {/* Dönem bilgisi ana ekranda */}
        {aktifDonem&&(
          <div style={{marginTop:20,background:"rgba(255,255,255,0.07)",borderRadius:12,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:13,color:"#fff",fontWeight:600}}>{aktifDonem.name}</div>
              <div style={{fontSize:11,color:"#888",marginTop:1}}>{aktifDonem.startDate}{aktifDonem.endDate?" → "+aktifDonem.endDate:""}</div>
            </div>
            <div style={{fontSize:11,color:aktifDonem.closed?"#e74c3c":"#2ecc71",fontWeight:600}}>{aktifDonem.closed?"🔒 Kapalı":"🟢 Aktif"}</div>
          </div>
        )}
      </div>

      {/* Ana kartlar */}
      <div style={{padding:"20px 16px",display:"flex",flexDirection:"column",gap:12}}>

        {/* Yeni Dönem butonu - sadece aktif dönem yoksa veya kapandıysa */}
        {(!aktifDonem||aktifDonem.closed)&&(
          <button onClick={()=>setShowNewDonem(true)} style={{
            background:"#1e8449",border:"none",borderRadius:14,padding:"16px 22px",
            cursor:"pointer",textAlign:"left",color:"#fff",
            boxShadow:"0 4px 16px rgba(30,132,73,0.3)"}}>
            <div style={{fontSize:18,marginBottom:4}}>＋ Yeni Dönem Aç</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.7)"}}>Yeni bir hesap dönemi başlat</div>
          </button>
        )}

        {/* Hesap Özeti kartı */}
        <button onClick={()=>setScreen("ozet")} style={{
          background:"#1a5276",border:"none",borderRadius:16,
          padding:"22px 22px",cursor:"pointer",textAlign:"left",
          boxShadow:"0 4px 20px rgba(26,82,118,0.3)",
          position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",right:-10,top:-10,fontSize:60,opacity:0.1}}>📊</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.6)",letterSpacing:2,marginBottom:8,fontWeight:500}}>
            {aktifDonem?.closed?"KAPALI DÖNEM":"AKTİF DÖNEM"}
          </div>
          <div className="playfair" style={{fontSize:20,fontWeight:700,color:"#fff",marginBottom:6}}>
            Hesap Özeti
          </div>
          <div style={{display:"flex",gap:20,marginTop:4}}>
            <div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:2}}>Net</div>
              <div style={{fontSize:14,color:"#2ecc71",fontWeight:600}}>{fmt(summary.netShare)}</div>
            </div>
            <div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:2}}>Kişi başı</div>
              <div style={{fontSize:14,color:"#f39c12",fontWeight:600}}>{fmt(summary.perPerson)}</div>
            </div>
          </div>
          <div style={{position:"absolute",right:20,top:"50%",transform:"translateY(-50%)",
            color:"rgba(255,255,255,0.4)",fontSize:20}}>›</div>
        </button>

        {/* Ortak kartları */}
        {[0,1,2].map(i=>{
          const ac=ACCENT[i],lt=LIGHT[i],bd=BORDER[i],r=summary.results[i];
          const totalEntries=getEntries(i).length;
          return (
            <button key={i} onClick={()=>{setScreen("ortak-"+i);setSubTab("kayitlar");}} style={{
              background:"#fff",border:`1px solid ${bd}`,borderRadius:16,
              padding:"20px 22px",cursor:"pointer",textAlign:"left",
              boxShadow:"0 2px 12px rgba(0,0,0,0.06)",
              position:"relative",overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <div style={{width:46,height:46,borderRadius:"50%",background:lt,
                    border:`2px solid ${bd}`,display:"flex",alignItems:"center",
                    justifyContent:"center",fontSize:18,color:ac,fontWeight:700}}>
                    {names[i][0]}
                  </div>
                  <div>
                    <div className="playfair" style={{fontSize:18,fontWeight:700,color:"#1a1a1a"}}>
                      {names[i]}
                    </div>
                    <div style={{fontSize:11,color:"#aaa",marginTop:2}}>
                      {totalEntries} kayıt
                    </div>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:"#aaa",marginBottom:3}}>
                    {r.balance>0.01?"alacak":r.balance<-0.01?"ödeyecek":"tamam"}
                  </div>
                  <div style={{fontSize:18,fontWeight:700,
                    color:r.balance>0.01?"#1e8449":r.balance<-0.01?"#c0392b":"#888"}}>
                    {r.balance>0.01?"+":""}{fmtPDF(r.balance)}
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:14}}>
                <div style={{flex:1,background:"#f9f8f6",borderRadius:8,padding:"8px 10px",border:"1px solid #ede9e3"}}>
                  <div style={{fontSize:10,color:"#aaa",marginBottom:2}}>Gelir</div>
                  <div style={{color:"#1e8449",fontWeight:600,fontSize:12}}>{fmtPDF(r.inc)}</div>
                </div>
                <div style={{flex:1,background:"#f9f8f6",borderRadius:8,padding:"8px 10px",border:"1px solid #ede9e3"}}>
                  <div style={{fontSize:10,color:"#aaa",marginBottom:2}}>Gider</div>
                  <div style={{color:"#c0392b",fontWeight:600,fontSize:12}}>{fmtPDF(r.exp)}</div>
                </div>
                <div style={{flex:1,background:"#f9f8f6",borderRadius:8,padding:"8px 10px",border:"1px solid #ede9e3"}}>
                  <div style={{fontSize:10,color:"#aaa",marginBottom:2}}>Alacak</div>
                  <div style={{color:"#d4ac0d",fontWeight:600,fontSize:12}}>{fmtPDF(r.toReceive)}</div>
                </div>
              </div>
              <div style={{position:"absolute",right:16,top:20,color:"#ddd",fontSize:18}}>›</div>
            </button>
          );
        })}
      </div>

      {/* KAYIT DÜZENLEME MODAL */}
      {editingEntry&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",
          display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"#fff",borderRadius:20,padding:28,
            width:"90%",maxWidth:340,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
            <div className="playfair" style={{fontSize:17,fontWeight:700,marginBottom:6}}>Kaydı Düzenle</div>
            <div style={{fontSize:12,color:"#aaa",marginBottom:20}}>
              {names[editingEntry.pIdx]} · {editingEntry.entry.date}
            </div>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              {["gelir","gider"].map(t=>(
                <div key={t} style={{flex:1,padding:"8px",borderRadius:8,textAlign:"center",
                  background:editingEntry.entry.type===t?(t==="gelir"?"#f0faf3":"#fdf2f2"):"#f9f8f6",
                  border:editingEntry.entry.type===t?(t==="gelir"?"2px solid #1e8449":"2px solid #c0392b"):"2px solid #ede9e3",
                  color:editingEntry.entry.type===t?(t==="gelir"?"#1e8449":"#c0392b"):"#aaa",fontSize:13}}>
                  {t==="gelir"?"↑ Gelir":"↓ Gider"}
                </div>
              ))}
            </div>
            <input value={editForm.desc}
              onChange={e=>setEditForm({...editForm,desc:e.target.value})}
              placeholder="Açıklama"
              style={{width:"100%",background:"#f9f8f6",border:"1px solid #ede9e3",
                borderRadius:8,padding:"11px 13px",color:"#1a1a1a",fontSize:14,marginBottom:10}}/>
            <input value={editForm.amount} type="number"
              onChange={e=>setEditForm({...editForm,amount:e.target.value})}
              onKeyDown={e=>{if(e.key==="Enter")saveEditEntry();}}
              placeholder="Tutar (₺)"
              style={{width:"100%",background:"#f9f8f6",border:"1px solid #ede9e3",
                borderRadius:8,padding:"11px 13px",color:"#1a1a1a",fontSize:14,marginBottom:16}}/>
            <div style={{display:"flex",gap:10}}>
              <button onClick={saveEditEntry}
                style={{flex:1,background:"#1a1a1a",border:"none",borderRadius:10,
                  padding:13,color:"#fff",cursor:"pointer",fontSize:14,fontWeight:600}}>Kaydet</button>
              <button onClick={()=>setEditingEntry(null)}
                style={{flex:1,background:"#f5f3ef",border:"none",borderRadius:10,
                  padding:13,color:"#555",cursor:"pointer",fontSize:14}}>İptal</button>
            </div>
          </div>
        </div>
      )}

      {/* YENİ DÖNEM MODAL */}
      {showNewDonem&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"#fff",borderRadius:20,padding:28,width:"90%",maxWidth:340,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
            <div className="playfair" style={{fontSize:18,fontWeight:700,marginBottom:6}}>Yeni Dönem</div>
            <div style={{fontSize:13,color:"#888",marginBottom:20,lineHeight:1.6}}>Bu dönem için bir isim girin.<br/><span style={{color:"#aaa",fontSize:12}}>Örn: "1-15 Mart", "Nisan İlk Yarı"</span></div>
            <input value={newDonemName} onChange={e=>setNewDonemName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")yeniDonemAc();}} placeholder="Dönem adı..." autoFocus style={{width:"100%",background:"#f9f8f6",border:"1px solid #ede9e3",borderRadius:8,padding:"12px 14px",color:"#1a1a1a",fontSize:15,marginBottom:10}}/>
            <div style={{fontSize:11,color:"#aaa",marginBottom:16}}>Başlangıç tarihi: {new Date().toLocaleDateString("tr-TR")}</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={yeniDonemAc} style={{flex:1,background:"#1e8449",border:"none",borderRadius:10,padding:13,color:"#fff",cursor:"pointer",fontSize:14,fontWeight:600}}>Dönemi Aç</button>
              <button onClick={()=>{setShowNewDonem(false);setNewDonemName("");}} style={{flex:1,background:"#f5f3ef",border:"none",borderRadius:10,padding:13,color:"#555",cursor:"pointer",fontSize:14}}>İptal</button>
            </div>
          </div>
        </div>
      )}

      {/* İSİM DÜZENLEME */}
      {editingNames&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",
          display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"#fff",borderRadius:20,padding:28,
            width:"90%",maxWidth:340,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
            <div className="playfair" style={{fontSize:17,fontWeight:700,marginBottom:20}}>
              Ortak İsimlerini Düzenle
            </div>
            {tempNames.map((n,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:LIGHT[i],
                  border:`1.5px solid ${BORDER[i]}`,display:"flex",alignItems:"center",
                  justifyContent:"center",fontSize:13,color:ACCENT[i],fontWeight:700,flexShrink:0}}>
                  {n[0]||"?"}
                </div>
                <input value={n}
                  onChange={e=>{const nn=[...tempNames];nn[i]=e.target.value;setTempNames(nn);}}
                  style={{flex:1,background:"#f9f8f6",border:"1px solid #ede9e3",borderRadius:8,
                    padding:"10px 13px",color:"#1a1a1a",fontSize:14}}/>
              </div>
            ))}
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button onClick={()=>{setNames(tempNames);setEditingNames(false);
                fbSave("buro/names",tempNames);showToast("✓ İsimler güncellendi");}}
                style={{flex:1,background:"#1a1a1a",border:"none",borderRadius:10,
                  padding:13,color:"#fff",cursor:"pointer",fontSize:14,fontWeight:600}}>Kaydet</button>
              <button onClick={()=>{setEditingNames(false);setTempNames(names);}}
                style={{flex:1,background:"#f5f3ef",border:"none",borderRadius:10,
                  padding:13,color:"#555",cursor:"pointer",fontSize:14}}>İptal</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
