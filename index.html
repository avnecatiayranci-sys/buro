<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Madalyon" />
  <title>Madalyon Hukuk Bürosu</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const firebaseConfig = {
      apiKey: "AIzaSyDGTijJZWADo26rjl1s_r1QSURhDeH_i6E",
      authDomain: "madalyon-hesap.firebaseapp.com",
      databaseURL: "https://madalyon-hesap-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "madalyon-hesap",
      storageBucket: "madalyon-hesap.firebasestorage.app",
      messagingSenderId: "1054387495626",
      appId: "1:1054387495626:web:3db7c0135f9f8965438a33"
    };
    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    window.__fbDb = db; window.__fbRef = ref;
    window.__fbSet = set; window.__fbOn = onValue;
    window.__fbReady = true;
    window.dispatchEvent(new Event("fb-ready"));
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:#f5f3ef; font-family:'Inter',sans-serif; color:#1a1a1a; }
    input { outline:none; font-family:'Inter',sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
    ::-webkit-scrollbar { width:0; }
    .playfair { font-family:'Playfair Display',serif; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const DEFAULT_NAMES = ["Yunus", "Batuhan", "Necati"];
const ACCENT  = ["#c0392b", "#1a5276", "#1e8449"];
const LIGHT   = ["#fdf2f2", "#f0f5fb", "#f0faf3"];
const BORDER  = ["#f5c6c2", "#b8d4ed", "#a9dfbf"];
const MONTHS  = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran",
                 "Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

const now = new Date();
const defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;

function fmt(n) {
  return n.toLocaleString("tr-TR",{minimumFractionDigits:2,maximumFractionDigits:2})+" ₺";
}
function monthLabel(ym) {
  const [y,m] = ym.split("-");
  return `${MONTHS[parseInt(m)-1]} ${y}`;
}
function fbSave(path, value) {
  if (!window.__fbReady) return;
  window.__fbSet(window.__fbRef(window.__fbDb, path), value);
}
function fbListen(path, cb) {
  if (!window.__fbReady) return ()=>{};
  const unsub = window.__fbOn(window.__fbRef(window.__fbDb, path), snap => cb(snap.val()));
  return unsub;
}

function App() {
  const [data,          setData]          = useState({});
  const [names,         setNames]         = useState(DEFAULT_NAMES);
  const [month,         setMonth]         = useState(defaultMonth);
  const [tab,           setTab]           = useState("ozet");
  const [subTab,        setSubTab]        = useState("kayitlar");
  const [form,          setForm]          = useState({type:"gelir",desc:"",amount:""});
  const [editingNames,  setEditingNames]  = useState(false);
  const [tempNames,     setTempNames]     = useState(DEFAULT_NAMES);
  const [fbReady,       setFbReady]       = useState(!!window.__fbReady);
  const [syncing,       setSyncing]       = useState(false);
  const [resetModal,    setResetModal]    = useState(false);   // sıfırlama modal
  const [resetConfirm,  setResetConfirm]  = useState("");      // onay metni
  const [toast,         setToast]         = useState(null);    // bildirim

  useEffect(() => {
    function start() {
      setFbReady(true);
      const u1 = fbListen("buro/data",  v => setData(v || {}));
      const u2 = fbListen("buro/names", v => { if(v){setNames(v);setTempNames(v);} });
      return () => { u1 && u1(); u2 && u2(); };
    }
    if (window.__fbReady) return start();
    const h = () => start();
    window.addEventListener("fb-ready", h);
    return () => window.removeEventListener("fb-ready", h);
  }, []);

  function showToast(msg, color="#1e8449") {
    setToast({msg, color});
    setTimeout(() => setToast(null), 2500);
  }

  function saveData(nd) {
    setSyncing(true);
    fbSave("buro/data", nd);
    setTimeout(() => setSyncing(false), 800);
  }

  function getEntries(i, m) { return data?.[m]?.[i] || []; }

  function addEntry(pIdx) {
    const amount = parseFloat(form.amount);
    if (!form.desc.trim() || isNaN(amount) || amount <= 0) return;
    const entry = { id:Date.now(), type:form.type, desc:form.desc.trim(),
                    amount, date:new Date().toLocaleDateString("tr-TR") };
    const nd = JSON.parse(JSON.stringify(data));
    if (!nd[month]) nd[month] = {};
    if (!nd[month][pIdx]) nd[month][pIdx] = [];
    nd[month][pIdx].push(entry);
    setData(nd); saveData(nd);
    setForm({type:form.type, desc:"", amount:""});
    showToast(form.type==="gelir" ? "✓ Gelir eklendi" : "✓ Gider eklendi",
              form.type==="gelir" ? "#1e8449" : "#c0392b");
  }

  function delEntry(pIdx, id) {
    const nd = JSON.parse(JSON.stringify(data));
    if (nd[month]?.[pIdx]) nd[month][pIdx] = nd[month][pIdx].filter(e=>e.id!==id);
    setData(nd); saveData(nd);
  }

  function doReset() {
    if (resetConfirm !== "SIFIRLA") return;
    const nd = JSON.parse(JSON.stringify(data));
    delete nd[month];
    setData(nd); saveData(nd);
    setResetModal(false); setResetConfirm("");
    showToast("🗑 " + monthLabel(month) + " verileri silindi", "#c0392b");
  }

  function calcSummary(m) {
    let totalIncome=0, totalExpense=0;
    const stats = [0,1,2].map(i => {
      const inc = getEntries(i,m).filter(e=>e.type==="gelir").reduce((s,e)=>s+e.amount,0);
      const exp = getEntries(i,m).filter(e=>e.type==="gider").reduce((s,e)=>s+e.amount,0);
      totalIncome+=inc; totalExpense+=exp;
      return {inc, exp};
    });
    const netShare=totalIncome-totalExpense, perPerson=netShare/3;
    const results=[0,1,2].map(i=>({
      ...stats[i],
      toReceive: perPerson+stats[i].exp,
      balance:   perPerson+stats[i].exp - stats[i].inc,
      perPerson
    }));
    return {totalIncome,totalExpense,netShare,perPerson,results};
  }

  const summary = calcSummary(month);
  const pIdx    = tab==="ozet" ? null : parseInt(tab);

  // ── LOADING ──
  if (!fbReady) return (
    <div style={{minHeight:"100vh",background:"#f5f3ef",display:"flex",
      alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:44,marginBottom:12}}>⚖️</div>
        <div className="playfair" style={{fontSize:20,color:"#1a1a1a",marginBottom:6}}>Madalyon Hukuk Bürosu</div>
        <div style={{color:"#888",fontSize:13}}>Bağlanıyor...</div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#f5f3ef",paddingBottom:80}}>

      {/* ── TOAST ── */}
      {toast && (
        <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",
          background:toast.color,color:"#fff",padding:"10px 20px",borderRadius:20,
          fontSize:13,fontWeight:500,zIndex:999,boxShadow:"0 4px 16px rgba(0,0,0,0.15)",
          whiteSpace:"nowrap"}}>
          {toast.msg}
        </div>
      )}

      {/* ── HEADER ── */}
      <div style={{background:"#fff",borderBottom:"1px solid #e8e4de",
        padding:"16px 16px 0",position:"sticky",top:0,zIndex:20,
        boxShadow:"0 1px 8px rgba(0,0,0,0.06)"}}>

        {/* Logo satırı */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>⚖️</span>
            <div>
              <div className="playfair" style={{fontSize:15,fontWeight:700,color:"#1a1a1a",lineHeight:1.2}}>
                MADALYON
              </div>
              <div style={{fontSize:10,color:"#888",letterSpacing:1.5,fontWeight:500}}>
                HUKUK BÜROSU
              </div>
            </div>
          </div>

          {/* Ay navigasyonu */}
          <div style={{display:"flex",alignItems:"center",gap:4,
            background:"#f5f3ef",borderRadius:20,padding:"4px 8px"}}>
            <button onClick={()=>{
              const [y,m2]=month.split("-").map(Number);
              const d=new Date(y,m2-2);
              setMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
            }} style={{background:"none",border:"none",color:"#555",cursor:"pointer",
              fontSize:18,padding:"0 4px",lineHeight:1}}>‹</button>
            <span style={{fontSize:12,color:"#333",fontWeight:500,minWidth:88,textAlign:"center"}}>
              {monthLabel(month)}
            </span>
            <button onClick={()=>{
              const [y,m2]=month.split("-").map(Number);
              const d=new Date(y,m2);
              setMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
            }} style={{background:"none",border:"none",color:"#555",cursor:"pointer",
              fontSize:18,padding:"0 4px",lineHeight:1}}>›</button>
          </div>

          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {syncing && <span style={{fontSize:10,color:"#aaa"}}>↑</span>}
            <button onClick={()=>{setEditingNames(true);setTempNames(names);}}
              style={{background:"none",border:"1px solid #ddd",borderRadius:8,
                color:"#666",padding:"5px 8px",cursor:"pointer",fontSize:12}}>✏️</button>
            <button onClick={()=>{setResetModal(true);setResetConfirm("");}}
              style={{background:"none",border:"1px solid #f5c6c2",borderRadius:8,
                color:"#c0392b",padding:"5px 8px",cursor:"pointer",fontSize:12}}>🗑</button>
          </div>
        </div>

        {/* Ana sekmeler */}
        <div style={{display:"flex",gap:0}}>
          {["ozet","0","1","2"].map(t=>{
            const lbl    = t==="ozet" ? "Özet" : names[parseInt(t)];
            const ac     = t==="ozet" ? "#1a1a1a" : ACCENT[parseInt(t)];
            const active = tab===t;
            return (
              <button key={t} onClick={()=>setTab(t)} style={{
                flex:1,background:"none",border:"none",
                borderBottom:active?`2.5px solid ${ac}`:"2.5px solid transparent",
                color:active?ac:"#aaa",
                padding:"8px 2px",cursor:"pointer",
                fontSize:12,fontWeight:active?600:400,
                fontFamily:"Inter,sans-serif",
                whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                transition:"all 0.15s"
              }}>{t==="ozet"?"📊 "+lbl:lbl}</button>
            );
          })}
        </div>
      </div>

      {/* ══ ÖZET ══ */}
      {tab==="ozet" && (
        <div style={{padding:"20px 16px"}}>

          {/* Ay özeti başlık kartı */}
          <div style={{background:"#1a1a1a",borderRadius:16,padding:"20px 20px",
            marginBottom:20,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",right:-20,top:-20,
              fontSize:80,opacity:0.06}}>⚖️</div>
            <div style={{fontSize:11,color:"#888",letterSpacing:2,marginBottom:6}}>
              {monthLabel(month).toUpperCase()}
            </div>
            <div className="playfair" style={{fontSize:28,color:"#fff",fontWeight:700,marginBottom:4}}>
              {fmt(summary.totalIncome)}
            </div>
            <div style={{fontSize:12,color:"#888"}}>toplam gelir</div>
            <div style={{display:"flex",gap:16,marginTop:14}}>
              <div>
                <div style={{fontSize:11,color:"#666",marginBottom:2}}>Gider</div>
                <div style={{fontSize:15,color:"#e74c3c",fontWeight:600}}>−{fmt(summary.totalExpense)}</div>
              </div>
              <div style={{width:1,background:"#333"}}></div>
              <div>
                <div style={{fontSize:11,color:"#666",marginBottom:2}}>Net</div>
                <div style={{fontSize:15,color:"#2ecc71",fontWeight:600}}>{fmt(summary.netShare)}</div>
              </div>
              <div style={{width:1,background:"#333"}}></div>
              <div>
                <div style={{fontSize:11,color:"#666",marginBottom:2}}>Kişi başı</div>
                <div style={{fontSize:15,color:"#f39c12",fontWeight:600}}>{fmt(summary.perPerson)}</div>
              </div>
            </div>
          </div>

          {/* Ortak kartları */}
          {[0,1,2].map(i=>{
            const ac=ACCENT[i], lt=LIGHT[i], bd=BORDER[i];
            const r=summary.results[i];
            const totalEntries = getEntries(i,month).length;
            return (
              <div key={i} style={{background:"#fff",border:`1px solid ${bd}`,
                borderRadius:14,padding:"16px 18px",marginBottom:12,
                boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:36,height:36,borderRadius:"50%",
                      background:lt,border:`2px solid ${bd}`,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:14,color:ac,fontWeight:700}}>
                      {names[i][0]}
                    </div>
                    <div>
                      <div className="playfair" style={{fontWeight:600,fontSize:15,color:"#1a1a1a"}}>
                        {names[i]}
                      </div>
                      <div style={{fontSize:11,color:"#aaa",marginTop:1}}>{totalEntries} kayıt</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:11,color:"#aaa",marginBottom:2}}>
                      {r.balance>0.01?"alacak":r.balance<-0.01?"ödeyecek":"tamam"}
                    </div>
                    <div style={{fontSize:17,fontWeight:700,
                      color:r.balance>0.01?"#1e8449":r.balance<-0.01?"#c0392b":"#888"}}>
                      {r.balance>0.01?"+":""}{fmt(r.balance)}
                    </div>
                  </div>
                </div>

                <div style={{display:"flex",gap:8}}>
                  {[["Topladığı",fmt(r.inc),"#1e8449"],
                    ["Harcadığı",fmt(r.exp),"#c0392b"],
                    ["Alacağı",  fmt(r.toReceive),"#d4ac0d"]].map(([lbl,val,col])=>(
                    <div key={lbl} style={{flex:1,background:"#f9f8f6",borderRadius:8,
                      padding:"8px 10px",border:"1px solid #ede9e3"}}>
                      <div style={{fontSize:10,color:"#aaa",marginBottom:3}}>{lbl}</div>
                      <div style={{color:col,fontWeight:600,fontSize:11}}>{val}</div>
                    </div>
                  ))}
                </div>

                <div style={{marginTop:10,padding:"8px 12px",borderRadius:8,fontSize:13,
                  textAlign:"center",fontWeight:500,
                  background:r.balance>0.01?"#f0faf3":r.balance<-0.01?"#fdf2f2":"#f9f8f6",
                  color:r.balance>0.01?"#1e8449":r.balance<-0.01?"#c0392b":"#888",
                  border:`1px solid ${r.balance>0.01?"#a9dfbf":r.balance<-0.01?"#f5c6c2":"#ede9e3"}`}}>
                  {r.balance>0.01?`Kasadan ${fmt(r.balance)} alacak`
                   :r.balance<-0.01?`Kasaya ${fmt(Math.abs(r.balance))} ödeyecek`
                   :"Hesap tamam ✓"}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ══ ORTAK SEKMELERİ ══ */}
      {tab!=="ozet" && pIdx!==null && (()=>{
        const ac=ACCENT[pIdx], lt=LIGHT[pIdx], bd=BORDER[pIdx];
        const myEntries=getEntries(pIdx,month);
        const myInc=myEntries.filter(e=>e.type==="gelir").reduce((s,e)=>s+e.amount,0);
        const myExp=myEntries.filter(e=>e.type==="gider").reduce((s,e)=>s+e.amount,0);
        const r=summary.results[pIdx];

        return (
          <div>
            {/* Mini özet şeridi */}
            <div style={{background:"#fff",borderBottom:"1px solid #ede9e3",padding:"12px 16px"}}>
              <div style={{display:"flex",gap:10,marginBottom:10}}>
                <div style={{flex:1,background:"#f0faf3",borderRadius:10,padding:"10px 14px",
                  border:"1px solid #a9dfbf"}}>
                  <div style={{fontSize:10,color:"#1e8449",letterSpacing:1,marginBottom:3,fontWeight:600}}>GELİR</div>
                  <div style={{fontSize:17,fontWeight:700,color:"#1e8449"}}>{fmt(myInc)}</div>
                </div>
                <div style={{flex:1,background:"#fdf2f2",borderRadius:10,padding:"10px 14px",
                  border:"1px solid #f5c6c2"}}>
                  <div style={{fontSize:10,color:"#c0392b",letterSpacing:1,marginBottom:3,fontWeight:600}}>GİDER</div>
                  <div style={{fontSize:17,fontWeight:700,color:"#c0392b"}}>{fmt(myExp)}</div>
                </div>
              </div>
              <div style={{display:"flex",borderRadius:10,overflow:"hidden",border:"1px solid #ede9e3"}}>
                {[["kayitlar","📝 Kayıtlar"],["hesap","⚖️ Hesabım"]].map(([k,lbl])=>(
                  <button key={k} onClick={()=>setSubTab(k)} style={{
                    flex:1,background:subTab===k?"#1a1a1a":"transparent",
                    border:"none",
                    color:subTab===k?"#fff":"#888",
                    padding:"9px 4px",cursor:"pointer",fontSize:13,
                    fontFamily:"Inter,sans-serif",fontWeight:subTab===k?600:400,
                    transition:"all 0.15s"
                  }}>{lbl}</button>
                ))}
              </div>
            </div>

            {/* Kayıtlar */}
            {subTab==="kayitlar" && (
              <div style={{padding:16}}>
                {/* Form */}
                <div style={{background:"#fff",border:`1px solid ${bd}`,borderRadius:14,
                  padding:16,marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
                  <div style={{fontSize:11,color:ac,letterSpacing:2,marginBottom:12,fontWeight:600}}>
                    YENİ KAYIT — {names[pIdx].toUpperCase()}
                  </div>
                  <div style={{display:"flex",gap:8,marginBottom:10}}>
                    {["gelir","gider"].map(t=>(
                      <button key={t} onClick={()=>setForm({...form,type:t})} style={{
                        flex:1,padding:"10px",borderRadius:8,cursor:"pointer",
                        border:form.type===t
                          ?(t==="gelir"?"2px solid #1e8449":"2px solid #c0392b")
                          :"2px solid #ede9e3",
                        background:form.type===t
                          ?(t==="gelir"?"#f0faf3":"#fdf2f2")
                          :"#f9f8f6",
                        color:form.type===t
                          ?(t==="gelir"?"#1e8449":"#c0392b")
                          :"#aaa",
                        fontFamily:"Inter,sans-serif",fontSize:14,fontWeight:500,
                        transition:"all 0.15s"
                      }}>{t==="gelir"?"↑ Gelir":"↓ Gider"}</button>
                    ))}
                  </div>
                  <input value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})}
                    placeholder="Açıklama (örn: Dava ücreti, Kırtasiye...)"
                    style={{width:"100%",background:"#f9f8f6",border:"1px solid #ede9e3",
                      borderRadius:8,padding:"11px 13px",color:"#1a1a1a",
                      fontSize:14,marginBottom:10}} />
                  <div style={{display:"flex",gap:10}}>
                    <input value={form.amount} type="number"
                      onChange={e=>setForm({...form,amount:e.target.value})}
                      onKeyDown={e=>{if(e.key==="Enter")addEntry(pIdx);}}
                      placeholder="Tutar (₺)"
                      style={{flex:1,background:"#f9f8f6",border:"1px solid #ede9e3",
                        borderRadius:8,padding:"11px 13px",color:"#1a1a1a",fontSize:14}} />
                    <button onClick={()=>addEntry(pIdx)} style={{
                      background:ac,border:"none",borderRadius:8,
                      padding:"11px 22px",color:"#fff",cursor:"pointer",
                      fontSize:22,fontWeight:"bold",boxShadow:`0 4px 12px ${ac}44`
                    }}>+</button>
                  </div>
                </div>

                {/* Liste başlık */}
                <div style={{fontSize:11,color:"#aaa",letterSpacing:2,marginBottom:12,fontWeight:600}}>
                  {monthLabel(month).toUpperCase()} KAYITLARI
                </div>

                {myEntries.length===0 && (
                  <div style={{textAlign:"center",padding:"50px 0",color:"#ccc",fontSize:14}}>
                    Henüz kayıt yok
                  </div>
                )}

                {[...myEntries].reverse().map(entry=>(
                  <div key={entry.id} style={{
                    background:"#fff",
                    borderLeft:`3px solid ${entry.type==="gelir"?"#1e8449":"#c0392b"}`,
                    borderRadius:"0 10px 10px 0",padding:"12px 16px",marginBottom:8,
                    display:"flex",justifyContent:"space-between",alignItems:"center",
                    boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:500,color:"#1a1a1a"}}>{entry.desc}</div>
                      <div style={{fontSize:11,color:"#bbb",marginTop:3}}>{entry.date}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{color:entry.type==="gelir"?"#1e8449":"#c0392b",
                        fontWeight:700,fontSize:15}}>
                        {entry.type==="gelir"?"+":"-"}{fmt(entry.amount)}
                      </div>
                      <button onClick={()=>delEntry(pIdx,entry.id)} style={{
                        background:"none",border:"none",color:"#ccc",
                        cursor:"pointer",fontSize:20,padding:0,lineHeight:1
                      }}>×</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Hesabım */}
            {subTab==="hesap" && (
              <div style={{padding:16}}>
                <div style={{background:"#fff",border:`1px solid ${bd}`,
                  borderRadius:14,padding:"20px 18px",marginBottom:14,
                  boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
                    <div style={{width:40,height:40,borderRadius:"50%",
                      background:lt,border:`2px solid ${bd}`,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:16,color:ac,fontWeight:700}}>
                      {names[pIdx][0]}
                    </div>
                    <div>
                      <div className="playfair" style={{fontSize:16,fontWeight:700,color:"#1a1a1a"}}>
                        {names[pIdx]}
                      </div>
                      <div style={{fontSize:11,color:"#aaa"}}>{monthLabel(month)} · Ay Sonu Hesabı</div>
                    </div>
                  </div>
                  {[
                    ["Topladığım Gelir",  fmt(r.inc),       "#1e8449"],
                    ["Yaptığım Gider",    fmt(r.exp),       "#c0392b"],
                    ["Kişi Başı Net Pay", fmt(r.perPerson), "#d4ac0d"],
                    ["Toplam Alacağım",   fmt(r.toReceive), "#1a5276"],
                  ].map(([lbl,val,col],i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",
                      alignItems:"center",
                      padding:"11px 0",
                      borderBottom:i<3?"1px solid #f5f3ef":"none"}}>
                      <span style={{color:"#888",fontSize:14}}>{lbl}</span>
                      <span style={{color:col,fontWeight:700,fontSize:15}}>{val}</span>
                    </div>
                  ))}
                </div>

                <div style={{padding:18,borderRadius:14,fontSize:16,textAlign:"center",
                  fontWeight:700,
                  background:r.balance>0.01?"#f0faf3":r.balance<-0.01?"#fdf2f2":"#f9f8f6",
                  border:`1.5px solid ${r.balance>0.01?"#a9dfbf":r.balance<-0.01?"#f5c6c2":"#ede9e3"}`,
                  color:r.balance>0.01?"#1e8449":r.balance<-0.01?"#c0392b":"#888"}}>
                  {r.balance>0.01?`💰 Kasadan ${fmt(r.balance)} alacaksın`
                   :r.balance<-0.01?`💸 Kasaya ${fmt(Math.abs(r.balance))} ödeyeceksin`
                   :"✅ Hesap tamam"}
                </div>
              </div>
            )}
          </div>
        );
      })()}

      {/* ══ SIFIRLAMA MODAL ══ */}
      {resetModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",
          display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"#fff",borderRadius:20,padding:28,
            width:"90%",maxWidth:340,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
            <div style={{fontSize:32,textAlign:"center",marginBottom:10}}>⚠️</div>
            <div className="playfair" style={{fontSize:18,fontWeight:700,textAlign:"center",
              marginBottom:8,color:"#1a1a1a"}}>Veri Sıfırlama</div>
            <div style={{fontSize:13,color:"#888",textAlign:"center",marginBottom:20,lineHeight:1.7}}>
              <strong style={{color:"#c0392b"}}>{monthLabel(month)}</strong> ayına ait tüm
              kayıtlar kalıcı olarak silinecek.<br/>
              Devam etmek için aşağıya <strong>SIFIRLA</strong> yazın.
            </div>
            <input value={resetConfirm}
              onChange={e=>setResetConfirm(e.target.value.toUpperCase())}
              placeholder="SIFIRLA yazın..."
              style={{width:"100%",background:"#f9f8f6",border:"1px solid #ede9e3",
                borderRadius:8,padding:"11px 13px",color:"#1a1a1a",
                fontSize:14,marginBottom:14,textAlign:"center",letterSpacing:2}} />
            <div style={{display:"flex",gap:10}}>
              <button onClick={doReset}
                disabled={resetConfirm!=="SIFIRLA"}
                style={{flex:1,background:resetConfirm==="SIFIRLA"?"#c0392b":"#f5c6c2",
                  border:"none",borderRadius:10,padding:13,
                  color:"#fff",cursor:resetConfirm==="SIFIRLA"?"pointer":"not-allowed",
                  fontSize:14,fontWeight:600,transition:"all 0.15s"}}>
                Sıfırla
              </button>
              <button onClick={()=>{setResetModal(false);setResetConfirm("");}}
                style={{flex:1,background:"#f5f3ef",border:"none",borderRadius:10,
                  padding:13,color:"#555",cursor:"pointer",fontSize:14,fontWeight:500}}>
                İptal
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ══ İSİM DÜZENLEME ══ */}
      {editingNames && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",
          display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
          <div style={{background:"#fff",borderRadius:20,padding:28,
            width:"90%",maxWidth:340,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
            <div className="playfair" style={{fontSize:17,fontWeight:700,
              marginBottom:20,color:"#1a1a1a"}}>Ortak İsimlerini Düzenle</div>
            {tempNames.map((n,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <div style={{width:32,height:32,borderRadius:"50%",
                  background:LIGHT[i],border:`1.5px solid ${BORDER[i]}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:13,color:ACCENT[i],fontWeight:700,flexShrink:0}}>
                  {n[0]||"?"}
                </div>
                <input value={n}
                  onChange={e=>{const nn=[...tempNames];nn[i]=e.target.value;setTempNames(nn);}}
                  style={{flex:1,background:"#f9f8f6",border:"1px solid #ede9e3",borderRadius:8,
                    padding:"10px 13px",color:"#1a1a1a",fontSize:14}} />
              </div>
            ))}
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button onClick={()=>{setNames(tempNames);setEditingNames(false);fbSave("buro/names",tempNames);showToast("✓ İsimler güncellendi");}}
                style={{flex:1,background:"#1a1a1a",border:"none",borderRadius:10,
                  padding:13,color:"#fff",cursor:"pointer",fontSize:14,fontWeight:600}}>Kaydet</button>
              <button onClick={()=>{setEditingNames(false);setTempNames(names);}}
                style={{flex:1,background:"#f5f3ef",border:"none",borderRadius:10,
                  padding:13,color:"#555",cursor:"pointer",fontSize:14}}>İptal</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
